<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{site/layout}">
<head>
    <title>내 정보</title>
</head>
<body>
<article layout:fragment="content" class="site-page">
    <h1 class="site-page-title">내 정보</h1>

    <div class="site-form-card">
        <div class="site-form-card-section">
            <div class="site-page-section-head">
                <h2 class="site-page-section-title">프로필</h2>
                <p class="site-page-section-desc">아이디는 수정할 수 없으며, 이름/이메일만 변경할 수 있습니다.</p>
            </div>

            <div id="siteMeProfileAlert" class="site-alert site-alert-hidden"></div>

            <div class="site-form-row">
                <label class="site-form-label">아이디</label>
                <input type="text" id="siteMeUsername" readonly>
                <div class="site-form-hint">회원가입 시 사용한 아이디입니다.</div>
            </div>

            <div class="site-form-row">
                <label class="site-form-label">이름 <span class="required">*</span></label>
                <input type="text" id="siteMeName" placeholder="이름을 입력해주세요.">
            </div>

            <div class="site-form-row">
                <label class="site-form-label">이메일</label>
                <input type="text" id="siteMeEmail" placeholder="example@email.com">
            </div>

            <div class="site-form-actions">
                <button type="button" class="site-btn site-btn-primary" id="siteMeSaveProfileBtn">
                    <i class="bi bi-check2-circle"></i> 저장
                </button>
            </div>
        </div>

        <div class="site-form-card-section">
            <div class="site-page-section-head">
                <h2 class="site-page-section-title">비밀번호 변경</h2>
                <p class="site-page-section-desc">팝업에서 현재 비밀번호를 확인한 뒤 새 비밀번호로 변경합니다.</p>
            </div>

            <div class="site-form-actions">
                <button type="button" class="site-btn site-btn-secondary" id="siteMeOpenPasswordModalBtn">
                    <i class="bi bi-key"></i> 비밀번호 변경 열기
                </button>
            </div>
        </div>

        <div class="site-form-card-section">
            <div class="site-page-section-head">
                <h2 class="site-page-section-title">나의 예약</h2>
                <p class="site-page-section-desc">내가 요청/확정한 예약 목록을 확인하고 필요 시 취소할 수 있습니다.</p>
            </div>

            <div id="siteMeReservationsAlert" class="site-alert site-alert-hidden"></div>
            <div id="siteMeReservationsLoading" class="site-loading">예약 목록을 불러오는 중입니다...</div>
            <div id="siteMeReservationsEmpty" class="site-empty hidden">예약 내역이 없습니다.</div>

            <div class="site-board-list-wrap">
                <table class="site-board-table" id="siteMeReservationsTable">
                    <thead>
                    <tr>
                        <th style="width: 90px;">상태</th>
                        <th>예약 시간</th>
                        <th style="width: 120px;">금액</th>
                        <th style="width: 90px;"></th>
                    </tr>
                    </thead>
                    <tbody id="siteMeReservationsTbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="siteMePasswordModal" class="site-modal-backdrop hidden" aria-hidden="true">
        <div class="site-modal-panel" role="dialog" aria-modal="true" aria-labelledby="siteMePasswordModalTitle">
            <div class="site-modal-header">
                <h3 id="siteMePasswordModalTitle" class="site-modal-title">비밀번호 변경</h3>
                <button type="button" class="site-modal-close" id="siteMeClosePasswordModalBtn" aria-label="닫기">×</button>
            </div>
            <div class="site-modal-body">
                <div id="siteMePasswordAlert" class="site-alert site-alert-hidden"></div>
                <div class="site-form-row">
                    <label class="site-form-label">현재 비밀번호 <span class="required">*</span></label>
                    <input type="password" id="siteMeCurrentPassword" placeholder="현재 비밀번호">
                </div>
                <div class="site-form-row">
                    <label class="site-form-label">새 비밀번호 <span class="required">*</span></label>
                    <input type="password" id="siteMeNewPassword" placeholder="새 비밀번호 (6~12자)">
                </div>
                <div class="site-form-row">
                    <label class="site-form-label">새 비밀번호 확인 <span class="required">*</span></label>
                    <input type="password" id="siteMeNewPasswordConfirm" placeholder="새 비밀번호 확인">
                </div>
            </div>
            <div class="site-modal-footer">
                <button type="button" class="site-btn site-btn-ghost" id="siteMeCancelPasswordModalBtn">닫기</button>
                <button type="button" class="site-btn site-btn-secondary" id="siteMeChangePasswordBtn">
                    <i class="bi bi-key"></i> 변경
                </button>
            </div>
        </div>
    </div>

    <style>
        .hidden { display: none !important; }
        .site-page-section-head { margin-bottom: var(--spacing-4); }
        .site-page-section-title { margin: 0 0 var(--spacing-1); font-size: var(--font-size-xl); }
        .site-page-section-desc { margin: 0; color: var(--color-text-muted); font-size: var(--font-size-sm); }
        .site-alert { padding: var(--spacing-3) var(--spacing-4); border: 1px solid var(--color-border); border-radius: var(--radius-lg); margin-bottom: var(--spacing-4); }
        .site-alert.site-alert-hidden { display: none; }
        .site-alert.is-error { border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.08); color: #fecaca; }
        .site-alert.is-success { border-color: rgba(16,185,129,0.35); background: rgba(16,185,129,0.08); color: #bbf7d0; }
        .site-empty { color: var(--color-text-muted); font-size: var(--font-size-sm); padding: var(--spacing-4) 0; }
        .site-board-table td .site-btn { padding: 0.35rem 0.6rem; }
        .site-form-row input[readonly] { opacity: 0.8; cursor: not-allowed; }
        .site-modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(2, 6, 23, 0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .site-modal-panel {
            width: 100%;
            max-width: 520px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            background: var(--color-bg-secondary);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        }
        .site-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-4) var(--spacing-5);
            border-bottom: 1px solid var(--color-border);
        }
        .site-modal-title {
            margin: 0;
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-semibold);
            color: var(--color-text);
        }
        .site-modal-close {
            border: none;
            background: transparent;
            color: var(--color-text-muted);
            font-size: 1.4rem;
            cursor: pointer;
        }
        .site-modal-body {
            padding: var(--spacing-5);
        }
        .site-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-2);
            padding: var(--spacing-4) var(--spacing-5);
            border-top: 1px solid var(--color-border);
        }
        .site-btn-ghost {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text-muted);
        }
        .site-btn-ghost:hover {
            color: var(--color-text);
            border-color: var(--color-border-light);
        }
        body.site-modal-open {
            overflow: hidden;
        }
    </style>

    <script>
        (function () {
            // layout.html의 window.__siteUser 세팅보다 먼저 실행될 수 있어 body 속성으로 직접 확인
            const isLoggedIn = document.body && document.body.getAttribute('data-site-user') === 'true';
            if (!isLoggedIn) {
                const returnUrl = '/site/me';
                window.location.href = '/site/auth/login?redirect=' + encodeURIComponent(returnUrl);
                return;
            }

            const profileAlert = document.getElementById('siteMeProfileAlert');
            const passwordAlert = document.getElementById('siteMePasswordAlert');
            const reservationsAlert = document.getElementById('siteMeReservationsAlert');

            const usernameEl = document.getElementById('siteMeUsername');
            const nameEl = document.getElementById('siteMeName');
            const emailEl = document.getElementById('siteMeEmail');

            const currentPwEl = document.getElementById('siteMeCurrentPassword');
            const newPwEl = document.getElementById('siteMeNewPassword');
            const newPwConfirmEl = document.getElementById('siteMeNewPasswordConfirm');

            const saveProfileBtn = document.getElementById('siteMeSaveProfileBtn');
            const openPasswordModalBtn = document.getElementById('siteMeOpenPasswordModalBtn');
            const changePwBtn = document.getElementById('siteMeChangePasswordBtn');
            const passwordModal = document.getElementById('siteMePasswordModal');
            const closePasswordModalBtn = document.getElementById('siteMeClosePasswordModalBtn');
            const cancelPasswordModalBtn = document.getElementById('siteMeCancelPasswordModalBtn');

            function showAlert(el, type, msg) {
                if (!el) return;
                el.classList.remove('site-alert-hidden', 'is-error', 'is-success');
                el.classList.add(type === 'success' ? 'is-success' : 'is-error');
                el.textContent = msg;
            }
            function hideAlert(el) {
                if (!el) return;
                el.classList.add('site-alert-hidden');
                el.textContent = '';
                el.classList.remove('is-error', 'is-success');
            }

            function openPasswordModal() {
                hideAlert(passwordAlert);
                currentPwEl.value = '';
                newPwEl.value = '';
                newPwConfirmEl.value = '';
                passwordModal.classList.remove('hidden');
                document.body.classList.add('site-modal-open');
            }

            function closePasswordModal() {
                passwordModal.classList.add('hidden');
                document.body.classList.remove('site-modal-open');
            }

            async function fetchJson(url, opts) {
                const res = await fetch(url, Object.assign({
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' }
                }, opts || {}));
                const data = await res.json().catch(() => null);
                return { res, data };
            }

            function statusLabel(status) {
                const map = {
                    'REQUESTED': '예약요청',
                    'CONFIRMED': '예약확정',
                    'CANCELLED_BY_USER': '사용자취소',
                    'REJECTED_BY_ADMIN': '관리자반려',
                    'CANCELLED_BY_ADMIN': '관리자취소'
                };
                return map[status] || status || '-';
            }

            function formatRange(start, end) {
                try {
                    const s = new Date(start);
                    const e = new Date(end);
                    const pad = n => String(n).padStart(2, '0');
                    const date = `${s.getFullYear()}-${pad(s.getMonth()+1)}-${pad(s.getDate())}`;
                    const st = `${pad(s.getHours())}:${pad(s.getMinutes())}`;
                    const et = `${pad(e.getHours())}:${pad(e.getMinutes())}`;
                    return `${date} ${st} ~ ${et}`;
                } catch (err) {
                    return `${start} ~ ${end}`;
                }
            }

            async function loadMe() {
                hideAlert(profileAlert);
                const { res, data } = await fetchJson('/api/v1/auth/me', { method: 'GET', headers: {} });
                if (!res.ok || !data || !data.success) {
                    if (res.status === 401 || res.status === 403) {
                        window.location.href = '/site/auth/login?redirect=' + encodeURIComponent('/site/me');
                        return;
                    }
                    showAlert(profileAlert, 'error', data?.error?.message || '내 정보를 불러올 수 없습니다.');
                    return;
                }
                const me = data.data;
                usernameEl.value = me.username || '';
                nameEl.value = me.name || '';
                emailEl.value = me.email || '';
            }

            saveProfileBtn.addEventListener('click', async function () {
                hideAlert(profileAlert);
                const name = (nameEl.value || '').trim();
                const email = (emailEl.value || '').trim();
                if (!name) {
                    showAlert(profileAlert, 'error', '이름을 입력해주세요.');
                    return;
                }
                saveProfileBtn.disabled = true;
                try {
                    const { res, data } = await fetchJson('/api/v1/users/me', {
                        method: 'PUT',
                        body: JSON.stringify({ name: name, email: email })
                    });
                    if (!res.ok || !data || !data.success) {
                        showAlert(profileAlert, 'error', data?.error?.message || '저장에 실패했습니다.');
                        return;
                    }
                    showAlert(profileAlert, 'success', '저장되었습니다.');
                    await loadMe();
                } catch (err) {
                    showAlert(profileAlert, 'error', '저장 중 오류가 발생했습니다.');
                } finally {
                    saveProfileBtn.disabled = false;
                }
            });

            changePwBtn.addEventListener('click', async function () {
                hideAlert(passwordAlert);
                const currentPassword = currentPwEl.value || '';
                const newPassword = newPwEl.value || '';
                const newPasswordConfirm = newPwConfirmEl.value || '';
                if (!currentPassword || !newPassword || !newPasswordConfirm) {
                    showAlert(passwordAlert, 'error', '필수 항목을 모두 입력해주세요.');
                    return;
                }
                changePwBtn.disabled = true;
                try {
                    const { res, data } = await fetchJson('/api/v1/users/me/password', {
                        method: 'PUT',
                        body: JSON.stringify({ currentPassword, newPassword, newPasswordConfirm })
                    });
                    if (!res.ok || !data || !data.success) {
                        showAlert(passwordAlert, 'error', data?.error?.message || '비밀번호 변경에 실패했습니다.');
                        return;
                    }
                    showAlert(passwordAlert, 'success', '비밀번호가 변경되었습니다.');
                    currentPwEl.value = '';
                    newPwEl.value = '';
                    newPwConfirmEl.value = '';
                    closePasswordModal();
                } catch (err) {
                    showAlert(passwordAlert, 'error', '비밀번호 변경 중 오류가 발생했습니다.');
                } finally {
                    changePwBtn.disabled = false;
                }
            });

            openPasswordModalBtn.addEventListener('click', openPasswordModal);
            closePasswordModalBtn.addEventListener('click', closePasswordModal);
            cancelPasswordModalBtn.addEventListener('click', closePasswordModal);
            passwordModal.addEventListener('click', function (e) {
                if (e.target === passwordModal) {
                    closePasswordModal();
                }
            });
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && !passwordModal.classList.contains('hidden')) {
                    closePasswordModal();
                }
            });

            async function loadMyReservations() {
                hideAlert(reservationsAlert);
                const loadingEl = document.getElementById('siteMeReservationsLoading');
                const emptyEl = document.getElementById('siteMeReservationsEmpty');
                const tbody = document.getElementById('siteMeReservationsTbody');
                const table = document.getElementById('siteMeReservationsTable');

                loadingEl.classList.remove('hidden');
                emptyEl.classList.add('hidden');
                table.classList.remove('hidden');
                tbody.innerHTML = '';

                const { res, data } = await fetchJson('/api/v1/public/rentals/reservations/my', { method: 'GET', headers: {} });
                loadingEl.classList.add('hidden');
                if (!res.ok || !data || !data.success) {
                    if (res.status === 401 || res.status === 403) {
                        window.location.href = '/site/auth/login?redirect=' + encodeURIComponent('/site/me');
                        return;
                    }
                    showAlert(reservationsAlert, 'error', data?.error?.message || '예약 목록을 불러올 수 없습니다.');
                    return;
                }

                const items = data.data || [];
                if (!items.length) {
                    emptyEl.classList.remove('hidden');
                    table.classList.add('hidden');
                    return;
                }

                const canCancel = (status) => status === 'REQUESTED' || status === 'CONFIRMED';

                items.forEach(item => {
                    const tr = document.createElement('tr');
                    const status = item.status;
                    const price = item.totalPrice != null ? Number(item.totalPrice).toLocaleString('ko-KR') + '원' : '-';
                    tr.innerHTML = `
                        <td>${statusLabel(status)}</td>
                        <td>${formatRange(item.start, item.end)}</td>
                        <td style="text-align:right;">${price}</td>
                        <td style="text-align:right;"></td>
                    `;
                    const actionTd = tr.querySelector('td:last-child');
                    if (canCancel(status)) {
                        const btn = document.createElement('button');
                        btn.type = 'button';
                        btn.className = 'site-btn site-btn-danger';
                        btn.textContent = '취소';
                        btn.onclick = async function () {
                            if (!confirm('예약을 취소하시겠습니까?')) return;
                            btn.disabled = true;
                            try {
                                const { res: dRes, data: dData } = await fetchJson('/api/v1/public/rentals/reservations/' + item.id, { method: 'DELETE' });
                                if (!dRes.ok || !dData || !dData.success) {
                                    showAlert(reservationsAlert, 'error', dData?.error?.message || '취소에 실패했습니다.');
                                    return;
                                }
                                showAlert(reservationsAlert, 'success', '예약이 취소되었습니다.');
                                await loadMyReservations();
                            } catch (err) {
                                showAlert(reservationsAlert, 'error', '취소 중 오류가 발생했습니다.');
                            } finally {
                                btn.disabled = false;
                            }
                        };
                        actionTd.appendChild(btn);
                    } else {
                        actionTd.textContent = '-';
                    }
                    tbody.appendChild(tr);
                });
            }

            loadMe().then(loadMyReservations);
        })();
    </script>
</article>
</body>
</html>
