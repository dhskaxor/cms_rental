<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:attr="data-theme=${siteConfig?.siteTheme ?: 'dark'}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - CMS</title>
    <link rel="stylesheet" href="/site/css/site.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        /* 인증 페이지 전용 레이아웃 */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-4);
            background: var(--color-bg);
        }
        .auth-container {
            width: 100%;
            max-width: 420px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: var(--spacing-6);
        }
        .auth-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 3rem;
            height: 3rem;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing-3);
        }
        .auth-logo .lucide {
            width: 1.5rem;
            height: 1.5rem;
            color: white;
        }
        .auth-title {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 var(--spacing-1);
        }
        .auth-subtitle {
            color: var(--color-text-muted);
            font-size: var(--font-size-sm);
        }
        .auth-card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: var(--spacing-6);
            box-shadow: var(--shadow-lg);
        }
        .auth-form-group {
            margin-bottom: var(--spacing-4);
        }
        .auth-form-group:last-of-type {
            margin-bottom: var(--spacing-5);
        }
        .auth-label {
            display: block;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-2);
        }
        .auth-input {
            width: 100%;
            padding: 0.65rem 0.85rem;
            background: var(--color-bg-input);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            color: var(--color-text);
            font-size: var(--font-size-base);
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
            outline: none;
            box-sizing: border-box;
        }
        .auth-input::placeholder {
            color: var(--color-text-dim);
        }
        .auth-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px rgba(var(--color-primary-rgb), 0.25);
        }
        .auth-submit {
            width: 100%;
            padding: 0.65rem 1rem;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            color: white;
            font-weight: var(--font-weight-semibold);
            font-size: var(--font-size-base);
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: opacity var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-2);
        }
        .auth-submit:hover { opacity: 0.9; }
        .auth-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .auth-links {
            margin-top: var(--spacing-5);
            text-align: center;
        }
        .auth-links a {
            color: var(--color-primary);
            font-size: var(--font-size-sm);
            text-decoration: none;
        }
        .auth-links a:hover { text-decoration: underline; }
        .auth-links p {
            color: var(--color-text-muted);
            font-size: var(--font-size-sm);
            margin: var(--spacing-2) 0 0;
        }
        .auth-footer {
            margin-top: var(--spacing-6);
            text-align: center;
            color: var(--color-text-dim);
            font-size: var(--font-size-xs);
        }
        /* 알림 메시지 */
        .auth-alert {
            padding: var(--spacing-3) var(--spacing-4);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing-4);
            font-size: var(--font-size-sm);
        }
        .auth-alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--color-danger);
        }
        .auth-alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--color-success);
        }
        .auth-spinner {
            display: none;
            animation: spin 1s linear infinite;
        }
        .auth-spinner.show { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo"><i data-lucide="cpu"></i></div>
                <h1 class="auth-title">CMS Core</h1>
                <p class="auth-subtitle">사용자 사이트 로그인</p>
            </div>

            <div class="auth-card">
                <!-- 에러 메시지 -->
                <div th:if="${error}" class="auth-alert auth-alert-error" th:text="${error}">로그인에 실패했습니다.</div>

                <!-- 로그아웃 메시지 -->
                <div th:if="${logout}" class="auth-alert auth-alert-success">로그아웃되었습니다.</div>

                <form th:action="@{/site/auth/login}" method="post" id="loginForm">
                    <div class="auth-form-group">
                        <label for="username" class="auth-label">아이디</label>
                        <input type="text" id="username" name="username" required
                               class="auth-input" placeholder="아이디를 입력하세요">
                    </div>

                    <div class="auth-form-group">
                        <label for="password" class="auth-label">비밀번호</label>
                        <input type="password" id="password" name="password" required
                               class="auth-input" placeholder="비밀번호를 입력하세요">
                    </div>

                    <input type="hidden" name="redirect" th:if="${redirect}" th:value="${redirect}" id="redirectInput">

                    <button type="submit" id="loginBtn" class="auth-submit">
                        <span id="loginBtnText">로그인</span>
                        <svg id="loginSpinner" class="auth-spinner" width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </form>

                <div class="auth-links">
                    <a th:href="@{/site/}">메인으로 돌아가기</a>
                    <p>계정이 없으신가요?
                        <a th:href="@{/site/auth/register(redirect=${redirect})}" style="font-weight:600;">회원가입</a>
                    </p>
                </div>
            </div>

            <div class="auth-footer">
                &copy; 2026 CMS Core Platform. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        if(window.lucide){lucide.createIcons();}

        document.getElementById('loginForm').addEventListener('submit', function() {
            var btn = document.getElementById('loginBtn');
            var btnText = document.getElementById('loginBtnText');
            var spinner = document.getElementById('loginSpinner');
            btn.disabled = true;
            btnText.textContent = '로그인 중...';
            spinner.classList.add('show');
        });

        document.querySelectorAll('input').forEach(function(input) {
            input.addEventListener('focus', function() {
                var errDiv = document.querySelector('.auth-alert-error');
                if (errDiv) errDiv.style.display = 'none';
            });
        });
    </script>
</body>
</html>
