<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .login-bg { background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%); }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-white mb-2">CMS</h1>
        <p class="text-white/80">사용자 사이트 회원가입</p>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">
        <div id="registerError" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
            <div class="flex items-center">
                <span class="text-red-700 text-sm" id="registerErrorText">회원가입에 실패했습니다.</span>
            </div>
        </div>

        <form id="registerForm">
            <input type="hidden" id="redirectInput" name="redirect" th:value="${redirect}">

            <div class="mb-4">
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">아이디</label>
                <input type="text" id="username" name="username" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition"
                       placeholder="아이디를 입력하세요">
            </div>

            <div class="mb-4">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">비밀번호</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition"
                       placeholder="비밀번호를 입력하세요">
            </div>

            <div class="mb-4">
                <label for="passwordConfirm" class="block text-sm font-medium text-gray-700 mb-2">비밀번호 확인</label>
                <input type="password" id="passwordConfirm" name="passwordConfirm" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition"
                       placeholder="비밀번호를 다시 입력하세요">
            </div>

            <div class="mb-4">
                <label for="name" class="block text-sm font-medium text-gray-700 mb-2">이름</label>
                <input type="text" id="name" name="name" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition"
                       placeholder="이름을 입력하세요">
            </div>

            <div class="mb-6">
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">이메일</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition"
                       placeholder="example@email.com">
            </div>

            <button type="submit" id="registerBtn"
                    class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                회원가입
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-600">
            이미 계정이 있으신가요?
            <a th:href="@{/site/auth/login(redirect=${redirect})}" class="font-semibold text-cyan-700 hover:text-cyan-900 transition">
                로그인
            </a>
        </div>
    </div>

    <div class="mt-8 text-center text-white/60 text-sm">
        &copy; 2026 CMS Core Platform. All rights reserved.
    </div>
</div>

<script>
    (function () {
        const form = document.getElementById('registerForm');
        const btn = document.getElementById('registerBtn');
        const errBox = document.getElementById('registerError');
        const errText = document.getElementById('registerErrorText');

        function showError(msg) {
            errText.textContent = msg || '회원가입에 실패했습니다.';
            errBox.classList.remove('hidden');
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            errBox.classList.add('hidden');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const redirect = document.getElementById('redirectInput').value || '/site/';

            if (password !== passwordConfirm) {
                showError('비밀번호가 일치하지 않습니다.');
                return;
            }

            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            try {
                const res = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ username, password, passwordConfirm, name, email })
                });
                const result = await res.json();
                if (!result || !result.success) {
                    const code = result?.error?.code;
                    if (code === 'USER_3004') {
                        showError('이미 사용중인 아이디 입니다. 다른 아이디를 사용하여 주세요.');
                        return;
                    }
                    showError(result?.error?.message || '회원가입에 실패했습니다.');
                    return;
                }
                const loginUrl = '/site/auth/login?redirect=' + encodeURIComponent(redirect);
                window.location.href = loginUrl;
            } catch (err) {
                showError('회원가입 처리 중 오류가 발생했습니다.');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });
    })();
</script>
</body>
</html>
