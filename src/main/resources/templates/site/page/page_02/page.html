<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{site/layout}">
<head>
    <title th:text="${page != null and page.pageTitle != null ? page.pageTitle : '페이지'}">페이지</title>
</head>
<body>
    <div layout:fragment="content">
        <article th:if="${page != null}" class="site-page site-page-02">
            <h1 class="site-page-title" th:text="${page.pageTitle} ?: '페이지'">제목</h1>
            <div class="site-page-content" th:utext="${page.content != null and not page.content.isEmpty() ? page.content : '<p>내용이 없습니다.</p>'}">내용</div>
        </article>
        <div th:if="${page == null}" class="site-error">
            <p>페이지를 찾을 수 없습니다.</p>
            <a th:href="@{/site/}">메인으로 돌아가기</a>
        </div>
    </div>
</body>
</html>
