<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>사용자 상세</title>
</head>
<body>
    <div layout:fragment="content">
            <!-- 페이지 헤더 -->
            <div class="mb-6 flex justify-between items-center">
                <h1 class="text-2xl font-bold text-gray-800">사용자 상세</h1>
                <div class="space-x-2">
                    <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" 
                       class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                        수정
                    </a>
                    <a href="/admin/users" 
                       class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                        목록
                    </a>
                </div>
            </div>

            <!-- 기본 정보 -->
            <div class="bg-white rounded-lg shadow mb-6">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-800">기본 정보</h2>
                </div>
                <div class="p-6">
                    <dl class="grid grid-cols-1 gap-x-6 gap-y-4 sm:grid-cols-2">
                        <div>
                            <dt class="text-sm font-medium text-gray-500">ID</dt>
                            <dd class="mt-1 text-sm text-gray-900" th:text="${user.id}"></dd>
                        </div>
                        <div>
                            <dt class="text-sm font-medium text-gray-500">아이디</dt>
                            <dd class="mt-1 text-sm text-gray-900" th:text="${user.username}"></dd>
                        </div>
                        <div>
                            <dt class="text-sm font-medium text-gray-500">이름</dt>
                            <dd class="mt-1 text-sm text-gray-900" th:text="${user.name}"></dd>
                        </div>
                        <div>
                            <dt class="text-sm font-medium text-gray-500">이메일</dt>
                            <dd class="mt-1 text-sm text-gray-900" th:text="${user.email ?: '-'}"></dd>
                        </div>
                        <div>
                            <dt class="text-sm font-medium text-gray-500">역할</dt>
                            <dd class="mt-1">
                                <span class="px-2 py-1 text-xs font-medium rounded-full"
                                      th:classappend="${user.roleCode == 'ADMIN'} ? 'bg-red-100 text-red-800' : 
                                                       (${user.roleCode == 'MANAGER'} ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-800')"
                                      th:text="${user.roleName}"></span>
                            </dd>
                        </div>
                        <div>
                            <dt class="text-sm font-medium text-gray-500">상태</dt>
                            <dd class="mt-1">
                                <span class="px-2 py-1 text-xs font-medium rounded-full"
                                      th:classappend="${user.status == 'ACTIVE'} ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
                                      th:text="${user.status == 'ACTIVE'} ? '활성' : '잠금'"></span>
                            </dd>
                        </div>
                        <div>
                            <dt class="text-sm font-medium text-gray-500">마지막 로그인</dt>
                            <dd class="mt-1 text-sm text-gray-900" 
                                th:text="${user.lastLoginAt != null} ? ${#temporals.format(user.lastLoginAt, 'yyyy-MM-dd HH:mm:ss')} : '-'"></dd>
                        </div>
                        <div>
                            <dt class="text-sm font-medium text-gray-500">등록일</dt>
                            <dd class="mt-1 text-sm text-gray-900" 
                                th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></dd>
                        </div>
                    </dl>
                </div>
            </div>

            <!-- 계정 관리 -->
            <div class="bg-white rounded-lg shadow">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-800">계정 관리</h2>
                </div>
                <div class="p-6 space-y-4">
                    <!-- 비밀번호 초기화 -->
                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                        <div>
                            <h3 class="text-sm font-medium text-gray-900">비밀번호 초기화</h3>
                            <p class="text-sm text-gray-500">새 비밀번호를 설정합니다.</p>
                        </div>
                        <button type="button" onclick="showResetPasswordModal()"
                                class="px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 transition">
                            비밀번호 초기화
                        </button>
                    </div>

                    <!-- 계정 잠금/해제 -->
                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                        <div>
                            <h3 class="text-sm font-medium text-gray-900" 
                                th:text="${user.status == 'ACTIVE'} ? '계정 잠금' : '계정 잠금 해제'"></h3>
                            <p class="text-sm text-gray-500" 
                               th:text="${user.status == 'ACTIVE'} ? '사용자가 로그인할 수 없도록 계정을 잠급니다.' : '잠긴 계정을 다시 활성화합니다.'"></p>
                        </div>
                        <button th:if="${user.status == 'ACTIVE'}" 
                                type="button" th:data-id="${user.id}"
                                onclick="lockUser(this)"
                                class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
                            계정 잠금
                        </button>
                        <button th:unless="${user.status == 'ACTIVE'}" 
                                type="button" th:data-id="${user.id}"
                                onclick="unlockUser(this)"
                                class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition">
                            잠금 해제
                        </button>
                    </div>

                    <!-- 사용자 삭제 -->
                    <div class="flex items-center justify-between p-4 bg-red-50 rounded-lg">
                        <div>
                            <h3 class="text-sm font-medium text-red-900">사용자 삭제</h3>
                            <p class="text-sm text-red-700">이 작업은 되돌릴 수 없습니다.</p>
                        </div>
                        <button type="button" th:data-id="${user.id}"
                                th:data-username="${user.username}"
                                onclick="deleteUser(this)"
                                class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">
                            삭제
                        </button>
                    </div>
                </div>
            </div>

    <!-- 비밀번호 초기화 모달 -->
    <div id="resetPasswordModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-900">비밀번호 초기화</h3>
            </div>
            <div class="p-6">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">새 비밀번호</label>
                    <input type="password" id="newPassword" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="영문/숫자/특수문자 포함 6~12자">
                    <p class="mt-1 text-sm text-gray-500">영문/숫자/특수문자를 포함하여 6~12자로 입력하세요.</p>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호 확인</label>
                    <input type="password" id="confirmPassword" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="비밀번호 확인">
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-200 flex justify-end space-x-2">
                <button type="button" onclick="hideResetPasswordModal()"
                        class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                    취소
                </button>
                <button type="button" th:data-id="${user.id}"
                        onclick="resetPassword(this)"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                    변경
                </button>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function showResetPasswordModal() {
            document.getElementById('resetPasswordModal').classList.remove('hidden');
            document.getElementById('resetPasswordModal').classList.add('flex');
        }

        function hideResetPasswordModal() {
            document.getElementById('resetPasswordModal').classList.add('hidden');
            document.getElementById('resetPasswordModal').classList.remove('flex');
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }

        function resetPassword(button) {
            const userId = button.dataset.id;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword) {
                alert('새 비밀번호를 입력해주세요.');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('비밀번호가 일치하지 않습니다.');
                return;
            }

            fetch('/api/v1/users/' + userId + '/password/reset', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ newPassword: newPassword }),
                credentials: 'same-origin'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('비밀번호가 초기화되었습니다.');
                    hideResetPasswordModal();
                } else {
                    alert(data.error?.message || '비밀번호 초기화에 실패했습니다.');
                }
            })
            .catch(error => {
                alert('오류가 발생했습니다.');
                console.error('Error:', error);
            });
        }

        function lockUser(button) {
            const userId = button.dataset.id;
            if (confirm('계정을 잠그시겠습니까?')) {
                fetch('/api/v1/users/' + userId + '/lock', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('계정이 잠겼습니다.');
                        location.reload();
                    } else {
                        alert(data.error?.message || '계정 잠금에 실패했습니다.');
                    }
                })
                .catch(error => {
                    alert('오류가 발생했습니다.');
                    console.error('Error:', error);
                });
            }
        }

        function unlockUser(button) {
            const userId = button.dataset.id;
            if (confirm('계정 잠금을 해제하시겠습니까?')) {
                fetch('/api/v1/users/' + userId + '/unlock', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('계정 잠금이 해제되었습니다.');
                        location.reload();
                    } else {
                        alert(data.error?.message || '계정 잠금 해제에 실패했습니다.');
                    }
                })
                .catch(error => {
                    alert('오류가 발생했습니다.');
                    console.error('Error:', error);
                });
            }
        }

        function deleteUser(button) {
            const userId = button.dataset.id;
            const username = button.dataset.username;
            if (confirm(username + ' 사용자를 삭제하시겠습니까?')) {
                fetch('/api/v1/users/' + userId, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('삭제되었습니다.');
                        location.href = '/admin/users';
                    } else {
                        alert(data.error?.message || '삭제에 실패했습니다.');
                    }
                })
                .catch(error => {
                    alert('오류가 발생했습니다.');
                    console.error('Error:', error);
                });
            }
        }
    </script>
    </div>
</body>
</html>
