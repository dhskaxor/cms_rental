<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>사용자 관리</title>
</head>
<body>
    <div layout:fragment="content">
            <!-- 페이지 헤더 -->
            <div class="mb-6 flex justify-between items-center">
                <h1 class="text-2xl font-bold text-gray-800">사용자 관리</h1>
                <a href="/admin/users/new" 
                   class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                    + 사용자 등록
                </a>
            </div>

            <!-- 검색 필터 -->
            <div class="bg-white rounded-lg shadow mb-6 p-4">
                <form method="get" action="/admin/users" class="flex flex-wrap gap-4 items-end">
                    <div class="flex-1 min-w-[200px]">
                        <label class="block text-sm font-medium text-gray-700 mb-1">검색어</label>
                        <input type="text" name="keyword" th:value="${keyword}" 
                               placeholder="아이디, 이름, 이메일"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div class="w-40">
                        <label class="block text-sm font-medium text-gray-700 mb-1">상태</label>
                        <select name="status" 
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="">전체</option>
                            <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">활성</option>
                            <option value="LOCKED" th:selected="${status == 'LOCKED'}">잠금</option>
                        </select>
                    </div>
                    <div>
                        <button type="submit" 
                                class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
                            검색
                        </button>
                        <a href="/admin/users" 
                           class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition ml-2">
                            초기화
                        </a>
                    </div>
                </form>
            </div>

            <!-- 사용자 목록 -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">아이디</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">이름</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">이메일</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">역할</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">상태</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">등록일</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">관리</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <tr th:if="${users == null or users.content.size() == 0}">
                            <td colspan="8" class="px-6 py-12 text-center text-gray-500">
                                등록된 사용자가 없습니다.
                            </td>
                        </tr>
                        <tr th:each="user : ${users?.content}" class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${user.id}"></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <a th:href="@{/admin/users/{id}(id=${user.id})}" 
                                   class="text-blue-600 hover:text-blue-800 font-medium" 
                                   th:text="${user.username}"></a>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${user.name}"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${user.email}"></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 py-1 text-xs font-medium rounded-full"
                                      th:classappend="${user.roleCode == 'ADMIN'} ? 'bg-red-100 text-red-800' : 
                                                       (${user.roleCode == 'MANAGER'} ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-800')"
                                      th:text="${user.roleName}"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 py-1 text-xs font-medium rounded-full"
                                      th:classappend="${user.status == 'ACTIVE'} ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
                                      th:text="${user.status == 'ACTIVE'} ? '활성' : '잠금'"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" 
                                th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium space-x-2">
                                <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" 
                                   class="text-indigo-600 hover:text-indigo-900">수정</a>
                                <button type="button" 
                                        th:data-id="${user.id}"
                                        th:data-username="${user.username}"
                                        onclick="deleteUser(this)"
                                        class="text-red-600 hover:text-red-900">삭제</button>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <!-- 페이징 -->
                <div th:if="${users != null and users.totalPages > 1}" 
                     class="bg-gray-50 px-4 py-3 flex items-center justify-between border-t border-gray-200 sm:px-6">
                    <div class="flex-1 flex justify-between sm:hidden">
                        <a th:if="${users.page > 1}" 
                           th:href="@{/admin/users(keyword=${keyword}, status=${status}, page=${users.page - 1}, size=${users.size})}"
                           class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                            이전
                        </a>
                        <a th:if="${users.page < users.totalPages}" 
                           th:href="@{/admin/users(keyword=${keyword}, status=${status}, page=${users.page + 1}, size=${users.size})}"
                           class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                            다음
                        </a>
                    </div>
                    <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                        <div>
                            <p class="text-sm text-gray-700">
                                총 <span class="font-medium" th:text="${users.totalElements}">0</span>건 중
                                <span class="font-medium" th:text="${(users.page - 1) * users.size + 1}">1</span> -
                                <span class="font-medium" th:text="${users.page * users.size > users.totalElements ? users.totalElements : users.page * users.size}">10</span>
                            </p>
                        </div>
                        <div>
                            <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                                <a th:if="${users.page > 1}" 
                                   th:href="@{/admin/users(keyword=${keyword}, status=${status}, page=${users.page - 1}, size=${users.size})}"
                                   class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                                    &lt;
                                </a>
                                <th:block th:each="pageNum : ${#numbers.sequence(1, users.totalPages)}">
                                    <a th:if="${pageNum == users.page}"
                                       class="z-10 bg-blue-50 border-blue-500 text-blue-600 relative inline-flex items-center px-4 py-2 border text-sm font-medium"
                                       th:text="${pageNum}"></a>
                                    <a th:unless="${pageNum == users.page}"
                                       th:href="@{/admin/users(keyword=${keyword}, status=${status}, page=${pageNum}, size=${users.size})}"
                                       class="bg-white border-gray-300 text-gray-500 hover:bg-gray-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium"
                                       th:text="${pageNum}"></a>
                                </th:block>
                                <a th:if="${users.page < users.totalPages}" 
                                   th:href="@{/admin/users(keyword=${keyword}, status=${status}, page=${users.page + 1}, size=${users.size})}"
                                   class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                                    &gt;
                                </a>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <script th:inline="javascript">
        function deleteUser(button) {
            const id = button.dataset.id;
            const username = button.dataset.username;
            if (confirm(username + ' 사용자를 삭제하시겠습니까?')) {
                fetch('/api/v1/users/' + id, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('삭제되었습니다.');
                        location.reload();
                    } else {
                        alert(data.error?.message || '삭제에 실패했습니다.');
                    }
                })
                .catch(error => {
                    alert('오류가 발생했습니다.');
                    console.error('Error:', error);
                });
            }
        }
    </script>
    </div>
</body>
</html>
