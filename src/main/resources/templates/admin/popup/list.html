<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>팝업 관리</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">팝업 관리</h1>
                <a th:href="@{/admin/popups/new}"
                   class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                    + 팝업 등록
                </a>
            </div>

            <!-- 검색 -->
            <form th:action="@{/admin/popups}" method="get" class="mb-6 p-4 bg-white rounded-lg border border-gray-200">
                <input type="hidden" name="page" value="1">
                <div class="flex flex-wrap gap-3 items-end">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">검색어</label>
                        <input type="text" name="keyword" th:value="${search?.keyword}"
                               placeholder="팝업코드/팝업명" class="rounded-md border-gray-300">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">유형</label>
                        <select name="popupType" class="rounded-md border-gray-300">
                            <option value="">전체</option>
                            <option value="LAYER" th:selected="${search?.popupType == 'LAYER'}">LAYER</option>
                            <option value="WINDOW" th:selected="${search?.popupType == 'WINDOW'}">WINDOW</option>
                            <option value="MODAL" th:selected="${search?.popupType == 'MODAL'}">MODAL</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">노출위치</label>
                        <select name="positionType" class="rounded-md border-gray-300">
                            <option value="">전체</option>
                            <option value="MAIN" th:selected="${search?.positionType == 'MAIN'}">MAIN</option>
                            <option value="SUB" th:selected="${search?.positionType == 'SUB'}">SUB</option>
                            <option value="ALL" th:selected="${search?.positionType == 'ALL'}">ALL</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">디바이스</label>
                        <select name="deviceType" class="rounded-md border-gray-300">
                            <option value="">전체</option>
                            <option value="PC" th:selected="${search?.deviceType == 'PC'}">PC</option>
                            <option value="MOBILE" th:selected="${search?.deviceType == 'MOBILE'}">MOBILE</option>
                            <option value="ALL" th:selected="${search?.deviceType == 'ALL'}">ALL</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">상태</label>
                        <select name="isActive" class="rounded-md border-gray-300">
                            <option value="">전체</option>
                            <option value="true" th:selected="${search?.isActive == true}">활성</option>
                            <option value="false" th:selected="${search?.isActive == false}">비활성</option>
                        </select>
                    </div>
                    <button type="submit" class="px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700">검색</button>
                </div>
            </form>

            <!-- 목록 테이블 -->
            <div class="bg-white shadow overflow-hidden sm:rounded-lg">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">팝업코드</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">팝업명</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">유형</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">노출위치</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">디바이스</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">노출기간</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">상태</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">관리</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <tr th:each="p : ${popups}" class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800 font-mono" th:text="${p.popupCode}"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <a th:href="@{/admin/popups/{id}(id=${p.id})}" class="text-indigo-600 hover:text-indigo-900 font-medium" th:text="${p.popupName}"></a>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${p.popupType}"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${p.positionType}"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${p.deviceType}"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                <span th:if="${p.startAt != null}" th:text="${#temporals.format(p.startAt, 'yyyy-MM-dd')}"></span>
                                <span th:if="${p.startAt != null and p.endAt != null}"> ~ </span>
                                <span th:if="${p.endAt != null}" th:text="${#temporals.format(p.endAt, 'yyyy-MM-dd')}"></span>
                                <span th:if="${p.startAt == null and p.endAt == null}">전체</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                <span th:if="${p.isActive}" class="text-green-600">활성</span>
                                <span th:unless="${p.isActive}" class="text-gray-400">비활성</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                <a th:href="@{/admin/popups/{id}(id=${p.id})}" class="text-indigo-600 hover:text-indigo-900 mr-3">상세</a>
                                <a th:href="@{/admin/popups/{id}/edit(id=${p.id})}" class="text-indigo-600 hover:text-indigo-900 mr-3">수정</a>
                                <button type="button" th:data-id="${p.id}" onclick="deletePopup(this)" class="text-red-600 hover:text-red-900">삭제</button>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(popups)}">
                            <td colspan="8" class="px-6 py-8 text-center text-gray-500">등록된 팝업이 없습니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 페이징 -->
            <div th:if="${page != null and page.totalPages > 1}" class="mt-6 flex justify-center gap-2">
                <a th:if="${page.hasPrevious()}"
                   th:href="@{/admin/popups(page=${page.page - 1}, size=${page.size}, keyword=${search?.keyword}, popupType=${search?.popupType}, positionType=${search?.positionType}, deviceType=${search?.deviceType}, isActive=${search?.isActive})}"
                   class="px-3 py-1 border rounded hover:bg-gray-100">이전</a>
                <span class="px-3 py-1 text-gray-600" th:text="${page.page + ' / ' + page.totalPages}"></span>
                <a th:if="${page.hasNext()}"
                   th:href="@{/admin/popups(page=${page.page + 1}, size=${page.size}, keyword=${search?.keyword}, popupType=${search?.popupType}, positionType=${search?.positionType}, deviceType=${search?.deviceType}, isActive=${search?.isActive})}"
                   class="px-3 py-1 border rounded hover:bg-gray-100">다음</a>
            </div>
        </div>

    <script th:inline="javascript">
        function deletePopup(btn) {
            const id = btn.dataset.id;
            if (!confirm('선택한 팝업을 삭제하시겠습니까?')) return;
            fetch('/api/v1/popups/' + id, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin'
            })
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    alert('삭제되었습니다.');
                    location.reload();
                } else {
                    alert(d.error?.message || '삭제에 실패했습니다.');
                }
            })
            .catch(() => alert('오류가 발생했습니다.'));
        }
    </script>
    </div>
</body>
</html>
