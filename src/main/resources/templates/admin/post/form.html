<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title th:text="${post != null} ? '게시글 수정' : '게시글 등록'">게시글</title>
    <!-- Toast UI Editor (useEditor 시에만 로드) -->
    <link th:if="${board.useEditor}" rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
</head>
<body>
    <div layout:fragment="content">
        <div class="max-w-4xl mx-auto">
            <div class="mb-6">
                <a th:href="@{'/admin/boards/' + ${board.id} + '/posts'}" class="text-indigo-600 hover:text-indigo-900">&larr; 목록</a>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-6" th:text="${post != null} ? '게시글 수정' : '게시글 등록'"></h1>
            <p class="text-sm text-gray-500 mb-4" th:text="'게시판: ' + ${board.boardName}"></p>

            <form id="postForm" class="bg-white rounded-lg shadow p-6 space-y-6">
                <input type="hidden" id="boardId" th:value="${board.id}">
                <input type="hidden" id="postId" th:value="${post?.id}">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">제목 *</label>
                    <input type="text" id="title" th:value="${post?.title}" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">내용</label>
                    <div th:if="${board.useEditor}" id="editorWrap" class="border border-gray-300 rounded-lg overflow-hidden"></div>
                    <textarea th:unless="${board.useEditor}" id="content" rows="15" th:text="${post?.content}"
                              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"></textarea>
                </div>

                <div class="flex gap-6">
                    <label class="flex items-center">
                        <input type="checkbox" id="isNotice" th:checked="${post?.isNotice == true}" class="mr-2">
                        <span class="text-sm text-gray-700">공지글</span>
                    </label>
                    <label class="flex items-center" th:if="${board.useSecret}">
                        <input type="checkbox" id="isSecret" th:checked="${post?.isSecret == true}" class="mr-2">
                        <span class="text-sm text-gray-700">비밀글</span>
                    </label>
                </div>

                <!-- 파일 첨부 (게시판 파일 사용 시) -->
                <div th:if="${board.useFile}" class="border-t pt-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">첨부파일</label>
                    <input type="hidden" id="maxFileCount" th:value="${board.maxFileCount != null ? board.maxFileCount : 5}">
                    <!-- 수정 시 기존 파일 목록 -->
                    <div th:if="${post != null and existingFiles != null and !existingFiles.isEmpty()}" class="mb-3">
                        <ul id="existingFilesList" class="space-y-2 text-sm">
                            <li th:each="f : ${existingFiles}" class="flex items-center justify-between py-1 border-b border-gray-100"
                                th:data-id="${f.id}">
                                <a th:href="@{/api/v1/files/{id}/download(id=${f.id})}" th:text="${f.originalName}"
                                   class="text-indigo-600 hover:text-indigo-900" download></a>
                                <button type="button" th:data-id="${f.id}" onclick="removeFile(this)" class="text-red-600 hover:text-red-800">삭제</button>
                            </li>
                        </ul>
                    </div>
                    <!-- 새 파일 추가 -->
                    <input type="file" id="fileInput" multiple
                           class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-medium file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                    <!-- 선택한 파일 목록 (업로드 전) -->
                    <ul id="selectedFilesList" class="mt-3 space-y-2 text-sm hidden">
                        <!-- 동적 생성 -->
                    </ul>
                    <p class="mt-1 text-xs text-gray-500">파일 선택 시 Ctrl/Shift로 여러 개 동시 선택 가능 · 최대 <span id="maxFileCountText" th:text="${board.maxFileCount != null ? board.maxFileCount : 5}"></span>개 (이미지, 문서 3MB 이하)</p>
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t">
                    <a th:href="@{'/admin/boards/' + ${board.id} + '/posts'}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">취소</a>
                    <button type="submit" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">저장</button>
                </div>
            </form>
        </div>

    <script th:if="${board.useEditor}" src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    <script th:inline="javascript">
        var useEditor = /*[[${board.useEditor}]]*/ false;
        var toastEditor = null;
        var editorAttachedFileIds = [];

        /* 새로 선택한 파일 목록 (File 객체) */
        var selectedNewFiles = [];

        function getMaxFileCount() {
            var el = document.getElementById('maxFileCount');
            return el ? parseInt(el.value) || 5 : 5;
        }

        function getExistingCount() {
            var list = document.getElementById('existingFilesList');
            return list ? list.querySelectorAll('li').length : 0;
        }

        function renderSelectedFilesList() {
            var ul = document.getElementById('selectedFilesList');
            if (!ul) return;
            ul.innerHTML = '';
            if (selectedNewFiles.length === 0) {
                ul.classList.add('hidden');
                return;
            }
            ul.classList.remove('hidden');
            for (var i = 0; i < selectedNewFiles.length; i++) {
                var f = selectedNewFiles[i];
                var li = document.createElement('li');
                li.className = 'flex items-center justify-between py-1 border-b border-gray-100';
                var span = document.createElement('span');
                span.className = 'text-gray-700';
                span.textContent = f.name || '파일';
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.dataset.index = String(i);
                btn.textContent = '제거';
                btn.className = 'text-red-600 hover:text-red-800';
                btn.onclick = function() { removeSelectedFile(this); };
                li.appendChild(span);
                li.appendChild(btn);
                ul.appendChild(li);
            }
        }

        function removeSelectedFile(btn) {
            var idx = parseInt(btn.dataset.index);
            if (!isNaN(idx) && idx >= 0 && idx < selectedNewFiles.length) {
                selectedNewFiles.splice(idx, 1);
                renderSelectedFilesList();
            }
        }

        /* 파일 선택 시 목록에 추가 (최대 개수 제한) */
        (function() {
            var fileInput = document.getElementById('fileInput');
            if (fileInput) {
                fileInput.addEventListener('change', function() {
                    var maxCount = getMaxFileCount();
                    var existingCount = getExistingCount();
                    var available = maxCount - existingCount - selectedNewFiles.length;
                    if (available <= 0) {
                        alert('첨부파일은 최대 ' + maxCount + '개까지 가능합니다.');
                        this.value = '';
                        return;
                    }
                    var files = Array.prototype.slice.call(this.files || []);
                    var toAdd = files.slice(0, available);
                    if (files.length > available) {
                        alert('최대 ' + maxCount + '개까지 가능합니다. ' + available + '개만 추가됩니다.');
                    }
                    selectedNewFiles = selectedNewFiles.concat(toAdd);
                    renderSelectedFilesList();
                    this.value = '';
                });
            }
        })();

        document.addEventListener('DOMContentLoaded', function() {
            if (useEditor) {
                var initialContent = /*[[${(post != null and post.content != null) ? post.content : ''}]]*/ '';
                var boardId = document.getElementById('boardId').value;
                var postIdEl = document.getElementById('postId');
                var postId = postIdEl && postIdEl.value ? postIdEl.value : null;
                var refId = postId ? parseInt(postId, 10) : 0;

                toastEditor = new toastui.Editor({
                    el: document.querySelector('#editorWrap'),
                    height: '400px',
                    initialEditType: 'wysiwyg',
                    previewStyle: 'vertical',
                    placeholder: '내용을 입력하세요.',
                    initialValue: initialContent,
                    hooks: {
                        addImageBlobHook: function(blob, callback) {
                            var formData = new FormData();
                            formData.append('file', blob);
                            fetch('/api/v1/files/upload?refType=POST&refId=' + refId, {
                                method: 'POST',
                                body: formData,
                                credentials: 'same-origin'
                            })
                            .then(function(r) { return r.json(); })
                            .then(function(res) {
                                if (res.success && res.data) {
                                    editorAttachedFileIds.push(res.data.id);
                                    callback('/api/v1/public/files/' + res.data.id + '/image', blob.name || 'image');
                                } else {
                                    alert(res.error?.message || '이미지 업로드에 실패했습니다.');
                                }
                            })
                            .catch(function() { alert('이미지 업로드 중 오류가 발생했습니다.'); });
                        }
                    }
                });
            }
        });

        function getContentValue() {
            if (useEditor && toastEditor) {
                return toastEditor.getHTML();
            }
            var el = document.getElementById('content');
            return el ? el.value : '';
        }

        /* 수정 시 기존 파일 삭제 (클릭 즉시 API 호출) */
        function removeFile(btn) {
            const id = btn.dataset.id;
            if (!confirm('이 파일을 삭제하시겠습니까?')) return;
            fetch('/api/v1/files/' + id, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin'
            })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.success) {
                    var li = btn.closest('li');
                    if (li) li.remove();
                } else {
                    alert(d.error?.message || '삭제에 실패했습니다.');
                }
            })
            .catch(function() { alert('오류가 발생했습니다.'); });
        }

        document.getElementById('postForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const boardId = document.getElementById('boardId').value;
            const postId = document.getElementById('postId').value;
            const fileInput = document.getElementById('fileInput');
            const maxFileCountEl = document.getElementById('maxFileCount');
            const maxFileCount = maxFileCountEl ? parseInt(maxFileCountEl.value) || 5 : 5;

            var data = {
                title: document.getElementById('title').value,
                content: getContentValue(),
                isNotice: document.getElementById('isNotice').checked,
                isSecret: document.getElementById('isSecret') ? document.getElementById('isSecret').checked : false,
                attachedFileIds: (useEditor && !postId) ? editorAttachedFileIds : []
            };

            function uploadFilesAfterPost(newPostId) {
                if (!selectedNewFiles || selectedNewFiles.length === 0) {
                    location.href = '/admin/boards/' + boardId + '/posts';
                    return;
                }
                var formData = new FormData();
                for (var i = 0; i < selectedNewFiles.length; i++) {
                    formData.append('files', selectedNewFiles[i]);
                }
                formData.append('refType', 'POST');
                formData.append('refId', newPostId);
                formData.append('maxCount', maxFileCount);
                fetch('/api/v1/files/upload/batch', {
                    method: 'POST',
                    body: formData,
                    credentials: 'same-origin'
                })
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.success) {
                        location.href = '/admin/boards/' + boardId + '/posts';
                    } else {
                        alert(d.error?.message || '파일 업로드에 실패했습니다.');
                    }
                })
                .catch(function() { alert('파일 업로드 중 오류가 발생했습니다.'); });
            }

            if (postId) {
                /* 수정: 게시글 수정 → 새 파일 업로드 */
                fetch('/api/v1/boards/' + boardId + '/posts/' + postId, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify(data)
                })
                .then(function(r) { return r.json(); })
                .then(function(result) {
                    if (!result.success) {
                        alert(result.error?.message || '저장에 실패했습니다.');
                        return;
                    }
                    var remainingCount = getExistingCount();
                    var newCount = selectedNewFiles.length;
                    if (remainingCount + newCount > maxFileCount) {
                        alert('첨부파일은 최대 ' + maxFileCount + '개까지 가능합니다.');
                        return;
                    }
                    if (newCount > 0) {
                        uploadFilesAfterPost(postId);
                    } else {
                        alert('저장되었습니다.');
                        location.href = '/admin/boards/' + boardId + '/posts';
                    }
                })
                .catch(function() { alert('저장 중 오류가 발생했습니다.'); });
            } else {
                /* 등록: 게시글 생성 → 파일 업로드 */
                fetch('/api/v1/boards/' + boardId + '/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify(data)
                })
                .then(function(r) { return r.json(); })
                .then(function(result) {
                    if (!result.success) {
                        alert(result.error?.message || '저장에 실패했습니다.');
                        return;
                    }
                    var newPostId = result.data && result.data.id;
                    if (!newPostId) {
                        alert('저장되었습니다.');
                        location.href = '/admin/boards/' + boardId + '/posts';
                        return;
                    }
                    var newCount = selectedNewFiles.length;
                    if (newCount > maxFileCount) {
                        alert('첨부파일은 최대 ' + maxFileCount + '개까지 가능합니다.');
                        location.href = '/admin/boards/' + boardId + '/posts';
                        return;
                    }
                    if (newCount > 0) {
                        uploadFilesAfterPost(newPostId);
                    } else {
                        alert('저장되었습니다.');
                        location.href = '/admin/boards/' + boardId + '/posts';
                    }
                })
                .catch(function() { alert('저장 중 오류가 발생했습니다.'); });
            }
        });
    </script>
    </div>
</body>
</html>
