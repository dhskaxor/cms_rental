<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>공통 코드</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">공통 코드</h1>
                <a th:href="@{/admin/common-codes/group/new}"
                   class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                    + 그룹 등록
                </a>
            </div>

            <div class="bg-white shadow overflow-hidden sm:rounded-lg">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">그룹 코드</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">그룹명</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">코드 수</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">등록일</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">관리</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <tr th:each="g : ${groups}" class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <a th:href="@{/admin/common-codes/group/{id}(id=${g.id})}" class="font-mono text-indigo-600 hover:text-indigo-900" th:text="${g.groupCode}"></a>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900" th:text="${g.groupName}"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${(g.codeCount != null ? g.codeCount : 0) + '개'}"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${g.createdAt != null ? #temporals.format(g.createdAt, 'yyyy-MM-dd') : '-'}"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                <a th:href="@{/admin/common-codes/group/{id}(id=${g.id})}" class="text-indigo-600 hover:text-indigo-900 mr-3">상세</a>
                                <a th:href="@{/admin/common-codes/group/{groupId}/code/new(groupId=${g.id})}" class="text-indigo-600 hover:text-indigo-900 mr-3">코드추가</a>
                                <button type="button" th:if="${!g.isSystem}" th:data-id="${g.id}" onclick="deleteGroup(this)" class="text-red-600 hover:text-red-900">삭제</button>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(groups)}">
                            <td colspan="5" class="px-6 py-8 text-center text-gray-500">등록된 그룹이 없습니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    <script th:inline="javascript">
        function deleteGroup(btn) {
            const id = btn.dataset.id;
            if (!confirm('선택한 그룹을 삭제하시겠습니까?')) return;
            fetch('/api/v1/common-code-groups/' + id, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin'
            })
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    alert('삭제되었습니다.');
                    location.reload();
                } else {
                    alert(d.error?.message || '삭제에 실패했습니다.');
                }
            })
            .catch(() => alert('오류가 발생했습니다.'));
        }
    </script>
    </div>
</body>
</html>
