<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>역할 관리</title>
</head>
<body>
    <div layout:fragment="content">
            <!-- 페이지 헤더 -->
            <div class="mb-6 flex justify-between items-center">
                <h1 class="text-2xl font-bold text-gray-800">역할 관리</h1>
                <a href="/admin/roles/new" 
                   class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                    + 역할 등록
                </a>
            </div>

            <!-- 역할 목록 -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">역할 코드</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">역할명</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">설명</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">사용자 수</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">등록일</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">관리</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <tr th:if="${roles == null or roles.size() == 0}">
                            <td colspan="7" class="px-6 py-12 text-center text-gray-500">
                                등록된 역할이 없습니다.
                            </td>
                        </tr>
                        <tr th:each="role : ${roles}" class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${role.id}"></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <a th:href="@{/admin/roles/{id}(id=${role.id})}" 
                                   class="text-blue-600 hover:text-blue-800 font-medium font-mono" 
                                   th:text="${role.roleCode}"></a>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${role.roleName}"></td>
                            <td class="px-6 py-4 text-sm text-gray-500 max-w-xs truncate" th:text="${role.description ?: '-'}"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${role.userCount ?: 0}"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" 
                                th:text="${role.createdAt != null} ? ${#temporals.format(role.createdAt, 'yyyy-MM-dd')} : '-'"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium space-x-2">
                                <a th:href="@{/admin/roles/{id}/edit(id=${role.id})}" 
                                   class="text-indigo-600 hover:text-indigo-900">수정</a>
                                <button type="button" 
                                        th:data-id="${role.id}"
                                        th:data-code="${role.roleCode}"
                                        th:data-count="${role.userCount ?: 0}"
                                        onclick="deleteRole(this)"
                                        class="text-red-600 hover:text-red-900">삭제</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 안내 -->
            <div class="mt-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
                <p class="text-sm text-yellow-700">
                    <strong>주의:</strong> 사용자가 할당된 역할은 삭제할 수 없습니다.
                </p>
            </div>
    <script th:inline="javascript">
        function deleteRole(button) {
            const id = button.dataset.id;
            const roleCode = button.dataset.code;
            const userCount = parseInt(button.dataset.count || 0);
            if (userCount > 0) {
                alert('사용자가 할당된 역할은 삭제할 수 없습니다. (사용자 수: ' + userCount + '명)');
                return;
            }
            if (confirm(roleCode + ' 역할을 삭제하시겠습니까?')) {
                fetch('/api/v1/roles/' + id, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('삭제되었습니다.');
                        location.reload();
                    } else {
                        alert(data.error?.message || '삭제에 실패했습니다.');
                    }
                })
                .catch(error => {
                    alert('오류가 발생했습니다.');
                    console.error('Error:', error);
                });
            }
        }
    </script>
    </div>
</body>
</html>
