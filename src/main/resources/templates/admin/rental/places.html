<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>렌탈 장소 관리</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">렌탈 장소 관리</h1>
            <button type="button"
                    onclick="openPlaceForm()"
                    class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                + 새 장소
            </button>
        </div>

        <!-- 장소 목록 -->
        <div class="bg-white shadow overflow-hidden sm:rounded-lg">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">장소명</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">주소</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">운영 시간</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">관리</th>
                </tr>
                </thead>
                <tbody id="placeTableBody" class="bg-white divide-y divide-gray-200">
                <tr>
                    <td colspan="5" class="px-6 py-6 text-center text-gray-500">로딩 중...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 장소 생성/수정 모달 -->
    <div id="placeModal" class="fixed inset-0 bg-gray-900 bg-opacity-40 z-40 hidden items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-lg">
            <div class="px-4 py-3 border-b border-gray-200 flex justify-between items-center">
                <h2 id="placeModalTitle" class="text-lg font-medium text-gray-900">장소 등록</h2>
                <button type="button" onclick="closePlaceForm()" class="text-gray-400 hover:text-gray-600">&times;</button>
            </div>
            <form id="placeForm" class="px-4 py-5 space-y-4">
                <input type="hidden" id="placeId">
                <div>
                    <label class="block text-sm font-medium text-gray-700">장소명</label>
                    <input id="placeName" type="text"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">주소</label>
                    <input id="placeAddress" type="text"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">설명</label>
                    <textarea id="placeDescription" rows="3"
                              class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">오픈 시간 (HH:mm)</label>
                        <input id="placeOpeningTime" type="text" placeholder="09:00"
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">마감 시간 (HH:mm)</label>
                        <input id="placeClosingTime" type="text" placeholder="18:00"
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>
                </div>
            </form>
            <div class="px-4 py-3 bg-gray-50 flex justify-end space-x-2 rounded-b-lg">
                <button type="button" onclick="closePlaceForm()"
                        class="inline-flex justify-center py-2 px-4 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                    취소
                </button>
                <button type="button" onclick="submitPlaceForm()"
                        class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700">
                    저장
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadPlaces);

        function loadPlaces() {
            const tbody = document.getElementById('placeTableBody');
            tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-6 text-center text-gray-500">로딩 중...</td></tr>';

            fetch('/admin/rental/places', { credentials: 'same-origin' })
                .then(r => r.json())
                .then(result => {
                    if (!result.success) {
                        tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-6 text-center text-red-500">장소 목록을 불러오지 못했습니다.</td></tr>';
                        return;
                    }
                    const places = result.data || [];
                    if (!places.length) {
                        tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-6 text-center text-gray-500">등록된 장소가 없습니다.</td></tr>';
                        return;
                    }
                    tbody.innerHTML = '';
                    places.forEach(p => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${p.id}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${p.name}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${p.address || ''}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                ${(p.openingTime || '')} ~ ${(p.closingTime || '')}
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
                                <button type="button" class="text-indigo-600 hover:text-indigo-900 mr-3" onclick='editPlace(${JSON.stringify(p)})'>수정</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(() => {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-6 text-center text-red-500">장소 목록을 불러오지 못했습니다.</td></tr>';
                });
        }

        function openPlaceForm() {
            document.getElementById('placeId').value = '';
            document.getElementById('placeName').value = '';
            document.getElementById('placeAddress').value = '';
            document.getElementById('placeDescription').value = '';
            document.getElementById('placeOpeningTime').value = '';
            document.getElementById('placeClosingTime').value = '';
            document.getElementById('placeModalTitle').textContent = '장소 등록';
            document.getElementById('placeModal').classList.remove('hidden');
            document.getElementById('placeModal').classList.add('flex');
        }

        function closePlaceForm() {
            document.getElementById('placeModal').classList.add('hidden');
            document.getElementById('placeModal').classList.remove('flex');
        }

        function editPlace(place) {
            document.getElementById('placeId').value = place.id;
            document.getElementById('placeName').value = place.name || '';
            document.getElementById('placeAddress').value = place.address || '';
            document.getElementById('placeDescription').value = place.description || '';
            document.getElementById('placeOpeningTime').value = place.openingTime || '';
            document.getElementById('placeClosingTime').value = place.closingTime || '';
            document.getElementById('placeModalTitle').textContent = '장소 수정';
            document.getElementById('placeModal').classList.remove('hidden');
            document.getElementById('placeModal').classList.add('flex');
        }

        function submitPlaceForm() {
            const id = document.getElementById('placeId').value;
            const payload = {
                name: document.getElementById('placeName').value,
                address: document.getElementById('placeAddress').value,
                description: document.getElementById('placeDescription').value,
                openingTime: document.getElementById('placeOpeningTime').value || null,
                closingTime: document.getElementById('placeClosingTime').value || null,
                timeZone: 'Asia/Seoul'
            };

            if (!payload.name) {
                alert('장소명을 입력해주세요.');
                return;
            }

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/admin/rental/places/${id}` : '/admin/rental/places';

            fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify(payload)
            })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        alert('저장되었습니다.');
                        closePlaceForm();
                        loadPlaces();
                    } else {
                        alert(result.error?.message || '저장에 실패했습니다.');
                    }
                })
                .catch(() => alert('오류가 발생했습니다.'));
        }
    </script>
</div>
</body>
</html>
