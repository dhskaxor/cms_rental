<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>예약 장소 관리</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">예약 장소 관리</h1>
            <button type="button"
                    onclick="openPlaceForm()"
                    class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                + 새 장소
            </button>
        </div>

        <!-- 장소 목록 -->
        <div class="bg-white shadow overflow-hidden sm:rounded-lg">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">장소명</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">주소</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">운영 시간</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">관리</th>
                </tr>
                </thead>
                <tbody id="placeTableBody" class="bg-white divide-y divide-gray-200">
                <tr>
                    <td colspan="5" class="px-6 py-6 text-center text-gray-500">로딩 중...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 장소 생성/수정 모달 -->
    <div id="placeModal" class="fixed inset-0 bg-gray-900 bg-opacity-40 z-40 hidden items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-lg">
            <div class="px-4 py-3 border-b border-gray-200 flex justify-between items-center">
                <h2 id="placeModalTitle" class="text-lg font-medium text-gray-900">장소 등록</h2>
                <button type="button" onclick="closePlaceForm()" class="text-gray-400 hover:text-gray-600">&times;</button>
            </div>
            <form id="placeForm" class="px-4 py-5 space-y-4">
                <input type="hidden" id="placeId">
                <div>
                    <label class="block text-sm font-medium text-gray-700">장소명</label>
                    <input id="placeName" type="text"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">주소</label>
                    <input id="placeAddress" type="text"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">설명</label>
                    <textarea id="placeDescription" rows="3"
                              class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">오픈 시간</label>
                        <select id="placeOpeningTime" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            <!-- 00:00 ~ 23:00 정각 -->
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">마감 시간</label>
                        <select id="placeClosingTime" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            <!-- 00:00 ~ 23:00 정각 -->
                        </select>
                    </div>
                </div>
                <div class="border-t pt-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">첨부파일</label>
                    <input type="hidden" id="placeMaxFileCount" value="20">
                    <!-- 수정 시 기존 파일 목록 -->
                    <div id="placeExistingFilesWrap" class="mb-3 hidden">
                        <ul id="placeExistingFilesList" class="space-y-2 text-sm"></ul>
                    </div>
                    <!-- 새 파일 추가 -->
                    <input type="file" id="placePhotos" accept="image/*" multiple
                           class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-medium file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                    <!-- 선택한 파일 목록 (업로드 전) -->
                    <ul id="placeSelectedFilesList" class="mt-3 space-y-2 text-sm hidden"></ul>
                    <p class="mt-1 text-xs text-gray-500">파일 선택 시 Ctrl/Shift로 여러 개 동시 선택 가능 · 최대 20개</p>
                </div>
            </form>
            <div class="px-4 py-3 bg-gray-50 flex justify-end space-x-2 rounded-b-lg">
                <button type="button" onclick="closePlaceForm()"
                        class="inline-flex justify-center py-2 px-4 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                    취소
                </button>
                <button type="button" onclick="submitPlaceForm()"
                        class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700">
                    저장
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const openSel = document.getElementById('placeOpeningTime');
            const closeSel = document.getElementById('placeClosingTime');
            for (let h = 0; h < 24; h++) {
                const v = String(h).padStart(2, '0') + ':00';
                openSel.appendChild(new Option(v, v));
                closeSel.appendChild(new Option(v, v));
            }
            window.placeSelectedNewFiles = [];
            (function() {
                var placeFileInput = document.getElementById('placePhotos');
                function placeGetExistingCount() {
                    var list = document.getElementById('placeExistingFilesList');
                    return list ? list.querySelectorAll('li').length : 0;
                }
                function placeRenderSelectedList() {
                    var ul = document.getElementById('placeSelectedFilesList');
                    if (!ul) return;
                    var arr = window.placeSelectedNewFiles || [];
                    ul.innerHTML = '';
                    if (arr.length === 0) {
                        ul.classList.add('hidden');
                        return;
                    }
                    ul.classList.remove('hidden');
                    arr.forEach(function(f, i) {
                        var li = document.createElement('li');
                        li.className = 'flex items-center justify-between py-1 border-b border-gray-100';
                        li.innerHTML = '<span class="text-gray-700">' + (f.name || '파일') + '</span>' +
                            '<button type="button" data-index="' + i + '" class="text-red-600 hover:text-red-800">제거</button>';
                        li.querySelector('button').onclick = function() {
                            window.placeSelectedNewFiles.splice(parseInt(this.dataset.index), 1);
                            placeRenderSelectedList();
                        };
                        ul.appendChild(li);
                    });
                }
                if (placeFileInput) {
                    placeFileInput.addEventListener('change', function() {
                        var maxCount = parseInt(document.getElementById('placeMaxFileCount').value) || 20;
                        var existingCount = placeGetExistingCount();
                        var arr = window.placeSelectedNewFiles || [];
                        var available = maxCount - existingCount - arr.length;
                        if (available <= 0) {
                            alert('첨부파일은 최대 ' + maxCount + '개까지 가능합니다.');
                            this.value = '';
                            return;
                        }
                        var files = Array.prototype.slice.call(this.files || []);
                        var toAdd = files.slice(0, available);
                        if (files.length > available) alert('최대 ' + maxCount + '개까지 가능합니다. ' + available + '개만 추가됩니다.');
                        window.placeSelectedNewFiles = arr.concat(toAdd);
                        placeRenderSelectedList();
                        this.value = '';
                    });
                }
                window.placeRenderSelectedList = placeRenderSelectedList;
            })();
            loadPlaces();
        });

        function loadPlaces() {
            const tbody = document.getElementById('placeTableBody');
            tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-6 text-center text-gray-500">로딩 중...</td></tr>';

            fetch('/admin/rental/places', { credentials: 'same-origin' })
                .then(r => r.json())
                .then(result => {
                    if (!result.success) {
                        tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-6 text-center text-red-500">장소 목록을 불러오지 못했습니다.</td></tr>';
                        return;
                    }
                    const places = result.data || [];
                    if (!places.length) {
                        tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-6 text-center text-gray-500">등록된 장소가 없습니다.</td></tr>';
                        return;
                    }
                    tbody.innerHTML = '';
                    places.forEach(p => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${p.id}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${p.name}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${p.address || ''}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                ${(p.openingTime || '')} ~ ${(p.closingTime || '')}
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
                                <button type="button" class="text-indigo-600 hover:text-indigo-900 mr-3" onclick='editPlace(${JSON.stringify(p)})'>수정</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(() => {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-6 text-center text-red-500">장소 목록을 불러오지 못했습니다.</td></tr>';
                });
        }

        function openPlaceForm() {
            document.getElementById('placeId').value = '';
            document.getElementById('placeName').value = '';
            document.getElementById('placeAddress').value = '';
            document.getElementById('placeDescription').value = '';
            document.getElementById('placeOpeningTime').value = '09:00';
            document.getElementById('placeClosingTime').value = '21:00';
            document.getElementById('placeExistingFilesWrap').classList.add('hidden');
            document.getElementById('placeExistingFilesList').innerHTML = '';
            window.placeSelectedNewFiles = [];
            if (window.placeRenderSelectedList) window.placeRenderSelectedList();
            document.getElementById('placePhotos').value = '';
            document.getElementById('placeModalTitle').textContent = '장소 등록';
            document.getElementById('placeModal').classList.remove('hidden');
            document.getElementById('placeModal').classList.add('flex');
        }

        function closePlaceForm() {
            document.getElementById('placeModal').classList.add('hidden');
            document.getElementById('placeModal').classList.remove('flex');
        }

        function timeToHhMm(val) {
            if (!val) return null;
            var s = String(val).trim();
            if (s.length >= 5) s = s.substring(0, 5);
            if (s.length === 4 && s.indexOf(':') === 1) s = '0' + s;
            return s;
        }
        function editPlace(place) {
            document.getElementById('placeId').value = place.id;
            document.getElementById('placeName').value = place.name || '';
            document.getElementById('placeAddress').value = place.address || '';
            document.getElementById('placeDescription').value = place.description || '';
            document.getElementById('placeOpeningTime').value = timeToHhMm(place.openingTime) || '09:00';
            document.getElementById('placeClosingTime').value = timeToHhMm(place.closingTime) || '21:00';
            window.placeSelectedNewFiles = [];
            if (window.placeRenderSelectedList) window.placeRenderSelectedList();
            document.getElementById('placePhotos').value = '';
            var existingWrap = document.getElementById('placeExistingFilesWrap');
            var existingList = document.getElementById('placeExistingFilesList');
            existingList.innerHTML = '';
            if (place.photos && place.photos.length > 0) {
                existingWrap.classList.remove('hidden');
                place.photos.forEach(function(photo) {
                    var li = document.createElement('li');
                    li.className = 'flex items-center justify-between py-1 border-b border-gray-100';
                    li.dataset.id = photo.id;
                    li.innerHTML = '<a href="/api/v1/files/' + photo.id + '/download" class="text-indigo-600 hover:text-indigo-900" download>' + (photo.originalName || '파일') + '</a>' +
                        '<button type="button" onclick="deletePlacePhoto(' + place.id + ',' + photo.id + ', this)" class="text-red-600 hover:text-red-800">삭제</button>';
                    existingList.appendChild(li);
                });
            } else {
                existingWrap.classList.add('hidden');
            }
            document.getElementById('placeModalTitle').textContent = '장소 수정';
            document.getElementById('placeModal').classList.remove('hidden');
            document.getElementById('placeModal').classList.add('flex');
        }

        function deletePlacePhoto(placeId, fileId, btnEl) {
            if (!confirm('이 파일을 삭제하시겠습니까?')) return;
            fetch('/api/v1/files/' + fileId, { method: 'DELETE', credentials: 'same-origin' })
                .then(function(r) { return r.json(); })
                .then(function(result) {
                    if (result.success) {
                        var li = btnEl.closest('li');
                        if (li) li.remove();
                        if (document.getElementById('placeExistingFilesList').querySelectorAll('li').length === 0) {
                            document.getElementById('placeExistingFilesWrap').classList.add('hidden');
                        }
                    } else alert(result.error?.message || '삭제에 실패했습니다.');
                })
                .catch(function() { alert('오류가 발생했습니다.'); });
        }

        function submitPlaceForm() {
            const id = document.getElementById('placeId').value;
            const payload = {
                name: document.getElementById('placeName').value,
                address: document.getElementById('placeAddress').value,
                description: document.getElementById('placeDescription').value,
                openingTime: document.getElementById('placeOpeningTime').value || null,
                closingTime: document.getElementById('placeClosingTime').value || null,
                timeZone: 'Asia/Seoul'
            };

            if (!payload.name) {
                alert('장소명을 입력해주세요.');
                return;
            }

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/admin/rental/places/${id}` : '/admin/rental/places';

            fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify(payload)
            })
                .then(r => r.json())
                .then(result => {
                    if (!result.success) {
                        alert(result.error?.message || '저장에 실패했습니다.');
                        return;
                    }
                    const placeId = id ? id : result.data;
                    const selectedFiles = window.placeSelectedNewFiles || [];
                    if (selectedFiles.length > 0) {
                        const formData = new FormData();
                        for (let i = 0; i < selectedFiles.length; i++) formData.append('files', selectedFiles[i]);
                        formData.append('refType', 'RENTAL_PLACE');
                        formData.append('refId', placeId);
                        formData.append('maxCount', '20');
                        fetch('/api/v1/files/upload/batch', { method: 'POST', credentials: 'same-origin', body: formData })
                            .then(r2 => r2.json())
                            .then(function() {
                                alert('저장되었습니다.');
                                closePlaceForm();
                                loadPlaces();
                            })
                            .catch(function() { alert('저장되었으나 사진 업로드에 실패할 수 있습니다.'); closePlaceForm(); loadPlaces(); });
                    } else {
                        alert('저장되었습니다.');
                        closePlaceForm();
                        loadPlaces();
                    }
                })
                .catch(() => alert('오류가 발생했습니다.'));
        }
    </script>
</div>
</body>
</html>
