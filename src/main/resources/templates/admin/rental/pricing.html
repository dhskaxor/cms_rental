<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>렌탈 요금 관리</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">렌탈 요금 관리</h1>
                <p class="text-sm text-gray-500 mt-1">
                    좌측에서 장소와 룸을 선택한 뒤, 기본/주말·공휴일/특수 요금을 설정할 수 있습니다.
                </p>
            </div>
        </div>

        <div class="grid grid-cols-4 gap-6">
            <!-- 장소/룸 선택 -->
            <div class="col-span-1 space-y-4">
                <div class="bg-white shadow rounded-lg overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-200">
                        <h2 class="text-sm font-medium text-gray-700">장소</h2>
                    </div>
                    <ul id="pricingPlaceList" class="divide-y divide-gray-200 max-h-64 overflow-y-auto">
                        <li class="px-4 py-4 text-center text-gray-500 text-sm">로딩 중...</li>
                    </ul>
                </div>
                <div class="bg-white shadow rounded-lg overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-200">
                        <h2 class="text-sm font-medium text-gray-700">룸</h2>
                    </div>
                    <ul id="pricingRoomList" class="divide-y divide-gray-200 max-h-64 overflow-y-auto">
                        <li class="px-4 py-4 text-center text-gray-500 text-sm">먼저 장소를 선택하세요.</li>
                    </ul>
                </div>
            </div>

            <!-- 요금 설정 -->
            <div class="col-span-3 bg-white shadow rounded-lg overflow-hidden">
                <div class="px-4 py-3 border-b border-gray-200 flex justify-between items-center">
                    <h2 class="text-sm font-medium text-gray-700">
                        <span id="pricingRoomTitle">룸을 선택하면 요금을 설정할 수 있습니다.</span>
                    </h2>
                </div>
                <div class="p-4 space-y-6">
                    <!-- 기본 요금 -->
                    <section>
                        <h3 class="text-sm font-semibold text-gray-800 mb-2">기본 요금</h3>
                        <div class="grid grid-cols-3 gap-4 items-end">
                            <div>
                                <label class="block text-xs font-medium text-gray-700">단위(분)</label>
                                <input id="baseUnitMinutes" type="number" min="15" step="15" value="60"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-700">가격(원)</label>
                                <input id="basePrice" type="number" min="0" step="1000"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                            <div class="flex justify-end">
                                <button type="button" onclick="saveBasePricing()"
                                        class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-xs font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                                    기본 요금 저장
                                </button>
                            </div>
                        </div>
                    </section>

                    <hr class="border-gray-200">

                    <!-- 주말/공휴일 요금 -->
                    <section>
                        <h3 class="text-sm font-semibold text-gray-800 mb-2">주말/공휴일 요금</h3>
                        <div class="grid grid-cols-4 gap-4 items-end">
                            <div>
                                <label class="block text-xs font-medium text-gray-700">적용 대상</label>
                                <select id="weekendApplyTo"
                                        class="mt-1 block w-full px-3 py-2 border border-gray-300 bg-white rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                                    <option value="">선택</option>
                                    <option value="WEEKEND">주말</option>
                                    <option value="HOLIDAY">공휴일</option>
                                    <option value="BOTH">주말+공휴일</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-700">단위(분)</label>
                                <input id="weekendUnitMinutes" type="number" min="15" step="15" value="60"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-700">가격(원)</label>
                                <input id="weekendPrice" type="number" min="0" step="1000"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                            <div class="flex justify-end">
                                <button type="button" onclick="saveWeekendHolidayPricing()"
                                        class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-xs font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                                    주말/공휴일 요금 저장
                                </button>
                            </div>
                        </div>
                    </section>

                    <hr class="border-gray-200">

                    <!-- 특수 요금 -->
                    <section>
                        <div class="flex items-center justify-between mb-2">
                            <h3 class="text-sm font-semibold text-gray-800">특수 요금</h3>
                            <button type="button" onclick="openSpecialModal()"
                                    class="inline-flex items-center px-3 py-1.5 border border-transparent rounded-md shadow-sm text-xs font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                                + 특수 요금 추가
                            </button>
                        </div>
                        <div class="border border-gray-200 rounded-md max-h-60 overflow-y-auto">
                            <table class="min-w-full text-xs">
                                <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-3 py-2 text-left text-[11px] font-medium text-gray-500 uppercase tracking-wider">날짜</th>
                                    <th class="px-3 py-2 text-left text-[11px] font-medium text-gray-500 uppercase tracking-wider">시간</th>
                                    <th class="px-3 py-2 text-left text-[11px] font-medium text-gray-500 uppercase tracking-wider">단위(분)</th>
                                    <th class="px-3 py-2 text-left text-[11px] font-medium text-gray-500 uppercase tracking-wider">가격(원)</th>
                                    <th class="px-3 py-2 text-right text-[11px] font-medium text-gray-500 uppercase tracking-wider">관리</th>
                                </tr>
                                </thead>
                                <tbody id="specialTableBody" class="bg-white divide-y divide-gray-200">
                                <tr>
                                    <td colspan="5" class="px-3 py-4 text-center text-gray-500 text-xs">특수 요금이 없습니다.</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <!-- 특수 요금 모달 -->
    <div id="specialModal" class="fixed inset-0 bg-gray-900 bg-opacity-40 z-40 hidden items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md">
            <div class="px-4 py-3 border-b border-gray-200 flex justify-between items-center">
                <h2 id="specialModalTitle" class="text-lg font-medium text-gray-900">특수 요금 등록</h2>
                <button type="button" onclick="closeSpecialModal()" class="text-gray-400 hover:text-gray-600">&times;</button>
            </div>
            <form id="specialForm" class="px-4 py-5 space-y-4">
                <input type="hidden" id="specialId">
                <div>
                    <label class="block text-sm font-medium text-gray-700">날짜</label>
                    <input id="specialDate" type="date"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">시작 시간</label>
                        <input id="specialStartTime" type="time"
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">종료 시간</label>
                        <input id="specialEndTime" type="time"
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">단위(분)</label>
                        <input id="specialUnitMinutes" type="number" min="15" step="15" value="60"
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">가격(원)</label>
                        <input id="specialPrice" type="number" min="0" step="1000"
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>
                </div>
            </form>
            <div class="px-4 py-3 bg-gray-50 flex justify-end space-x-2 rounded-b-lg">
                <button type="button" onclick="closeSpecialModal()"
                        class="inline-flex justify-center py-2 px-4 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                    취소
                </button>
                <button type="button" onclick="submitSpecialForm()"
                        class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700">
                    저장
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentPricingPlaceId = null;
        let currentPricingRoomId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadPricingPlaces();
        });

        function loadPricingPlaces() {
            const ul = document.getElementById('pricingPlaceList');
            ul.innerHTML = '<li class="px-4 py-4 text-center text-gray-500 text-sm">로딩 중...</li>';
            fetch('/admin/rental/places', { credentials: 'same-origin' })
                .then(r => r.json())
                .then(result => {
                    if (!result.success) {
                        ul.innerHTML = '<li class="px-4 py-4 text-center text-red-500 text-sm">장소 목록을 불러오지 못했습니다.</li>';
                        return;
                    }
                    const places = result.data || [];
                    if (!places.length) {
                        ul.innerHTML = '<li class="px-4 py-4 text-center text-gray-500 text-sm">등록된 장소가 없습니다.</li>';
                        return;
                    }
                    ul.innerHTML = '';
                    places.forEach(p => {
                        const li = document.createElement('li');
                        li.className = 'px-4 py-3 cursor-pointer hover:bg-gray-50 text-sm flex justify-between items-center';
                        li.innerHTML = `
                            <span>${p.name}</span>
                            <span class="text-xs text-gray-400">ID: ${p.id}</span>
                        `;
                        li.onclick = () => selectPricingPlace(p);
                        ul.appendChild(li);
                    });
                })
                .catch(() => {
                    ul.innerHTML = '<li class="px-4 py-4 text-center text-red-500 text-sm">장소 목록을 불러오지 못했습니다.</li>';
                });
        }

        function selectPricingPlace(place) {
            currentPricingPlaceId = place.id;
            currentPricingRoomId = null;
            document.getElementById('pricingRoomTitle').textContent = '룸을 선택하면 요금을 설정할 수 있습니다.';
            document.getElementById('specialTableBody').innerHTML =
                '<tr><td colspan="5" class="px-3 py-4 text-center text-gray-500 text-xs">특수 요금이 없습니다.</td></tr>';
            loadPricingRooms();
        }

        function loadPricingRooms() {
            const ul = document.getElementById('pricingRoomList');
            if (!currentPricingPlaceId) {
                ul.innerHTML = '<li class="px-4 py-4 text-center text-gray-500 text-sm">먼저 장소를 선택하세요.</li>';
                return;
            }
            ul.innerHTML = '<li class="px-4 py-4 text-center text-gray-500 text-sm">로딩 중...</li>';
            fetch(`/admin/rental/rooms?placeId=${currentPricingPlaceId}`, { credentials: 'same-origin' })
                .then(r => r.json())
                .then(result => {
                    if (!result.success) {
                        ul.innerHTML = '<li class="px-4 py-4 text-center text-red-500 text-sm">룸 목록을 불러오지 못했습니다.</li>';
                        return;
                    }
                    const rooms = result.data || [];
                    if (!rooms.length) {
                        ul.innerHTML = '<li class="px-4 py-4 text-center text-gray-500 text-sm">등록된 룸이 없습니다.</li>';
                        return;
                    }
                    ul.innerHTML = '';
                    rooms.forEach(rm => {
                        const li = document.createElement('li');
                        li.className = 'px-4 py-3 cursor-pointer hover:bg-gray-50 text-sm flex justify-between items-center';
                        li.innerHTML = `
                            <span>${rm.name}</span>
                            <span class="text-xs text-gray-400">ID: ${rm.id}</span>
                        `;
                        li.onclick = () => selectPricingRoom(rm);
                        ul.appendChild(li);
                    });
                })
                .catch(() => {
                    ul.innerHTML = '<li class="px-4 py-4 text-center text-red-500 text-sm">룸 목록을 불러오지 못했습니다.</li>';
                });
        }

        function selectPricingRoom(room) {
            currentPricingRoomId = room.id;
            document.getElementById('pricingRoomTitle').textContent = `[${room.id}] ${room.name} 의 요금 설정`;
            loadAllPricing();
        }

        function ensureRoomSelected() {
            if (!currentPricingRoomId) {
                alert('먼저 룸을 선택하세요.');
                return false;
            }
            return true;
        }

        function loadAllPricing() {
            if (!ensureRoomSelected()) {
                return;
            }
            loadBasePricing();
            loadWeekendHolidayPricing();
            loadSpecialPricing();
        }

        function loadBasePricing() {
            fetch(`/admin/rental/rooms/${currentPricingRoomId}/pricing/base`, { credentials: 'same-origin' })
                .then(r => r.json())
                .then(result => {
                    if (!result.success || !result.data) {
                        document.getElementById('baseUnitMinutes').value = 60;
                        document.getElementById('basePrice').value = '';
                        return;
                    }
                    document.getElementById('baseUnitMinutes').value = result.data.unitMinutes ?? 60;
                    document.getElementById('basePrice').value = result.data.price ?? '';
                })
                .catch(() => {
                    document.getElementById('baseUnitMinutes').value = 60;
                    document.getElementById('basePrice').value = '';
                });
        }

        function saveBasePricing() {
            if (!ensureRoomSelected()) return;
            const unitMinutes = parseInt(document.getElementById('baseUnitMinutes').value || '0', 10);
            const price = parseInt(document.getElementById('basePrice').value || '0', 10);
            if (!unitMinutes || unitMinutes <= 0 || unitMinutes % 15 !== 0) {
                alert('단위(분)는 15분 단위로 입력해주세요.');
                return;
            }
            if (price < 0) {
                alert('가격은 0 이상이어야 합니다.');
                return;
            }
            const payload = { unitMinutes, price };
            fetch(`/admin/rental/rooms/${currentPricingRoomId}/pricing/base`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify(payload)
            })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        alert('기본 요금이 저장되었습니다.');
                        loadBasePricing();
                    } else {
                        alert(result.error?.message || '기본 요금 저장에 실패했습니다.');
                    }
                })
                .catch(() => alert('기본 요금 저장 중 오류가 발생했습니다.'));
        }

        function loadWeekendHolidayPricing() {
            fetch(`/admin/rental/rooms/${currentPricingRoomId}/pricing/weekend-holiday`, { credentials: 'same-origin' })
                .then(r => r.json())
                .then(result => {
                    if (!result.success || !result.data) {
                        document.getElementById('weekendApplyTo').value = '';
                        document.getElementById('weekendUnitMinutes').value = 60;
                        document.getElementById('weekendPrice').value = '';
                        return;
                    }
                    document.getElementById('weekendApplyTo').value = result.data.applyTo || '';
                    document.getElementById('weekendUnitMinutes').value = result.data.unitMinutes ?? 60;
                    document.getElementById('weekendPrice').value = result.data.price ?? '';
                })
                .catch(() => {
                    document.getElementById('weekendApplyTo').value = '';
                    document.getElementById('weekendUnitMinutes').value = 60;
                    document.getElementById('weekendPrice').value = '';
                });
        }

        function saveWeekendHolidayPricing() {
            if (!ensureRoomSelected()) return;
            const applyTo = document.getElementById('weekendApplyTo').value;
            const unitMinutes = parseInt(document.getElementById('weekendUnitMinutes').value || '0', 10);
            const price = parseInt(document.getElementById('weekendPrice').value || '0', 10);
            if (!applyTo) {
                alert('적용 대상을 선택해주세요.');
                return;
            }
            if (!unitMinutes || unitMinutes <= 0 || unitMinutes % 15 !== 0) {
                alert('단위(분)는 15분 단위로 입력해주세요.');
                return;
            }
            if (price < 0) {
                alert('가격은 0 이상이어야 합니다.');
                return;
            }
            const payload = { applyTo, unitMinutes, price };
            fetch(`/admin/rental/rooms/${currentPricingRoomId}/pricing/weekend-holiday`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify(payload)
            })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        alert('주말/공휴일 요금이 저장되었습니다.');
                        loadWeekendHolidayPricing();
                    } else {
                        alert(result.error?.message || '주말/공휴일 요금 저장에 실패했습니다.');
                    }
                })
                .catch(() => alert('주말/공휴일 요금 저장 중 오류가 발생했습니다.'));
        }

        function loadSpecialPricing() {
            const tbody = document.getElementById('specialTableBody');
            tbody.innerHTML = '<tr><td colspan="5" class="px-3 py-4 text-center text-gray-500 text-xs">로딩 중...</td></tr>';
            fetch(`/admin/rental/rooms/${currentPricingRoomId}/pricing/special`, { credentials: 'same-origin' })
                .then(r => r.json())
                .then(result => {
                    if (!result.success) {
                        tbody.innerHTML = '<tr><td colspan="5" class="px-3 py-4 text-center text-red-500 text-xs">특수 요금을 불러오지 못했습니다.</td></tr>';
                        return;
                    }
                    const list = result.data || [];
                    if (!list.length) {
                        tbody.innerHTML = '<tr><td colspan="5" class="px-3 py-4 text-center text-gray-500 text-xs">특수 요금이 없습니다.</td></tr>';
                        return;
                    }
                    tbody.innerHTML = '';
                    list.forEach(sp => {
                        const tr = document.createElement('tr');
                        const timeLabel = `${(sp.startTime || '').substring(0,5)} ~ ${(sp.endTime || '').substring(0,5)}`;
                        tr.innerHTML = `
                            <td class="px-3 py-2 whitespace-nowrap text-xs text-gray-700">${sp.date}</td>
                            <td class="px-3 py-2 whitespace-nowrap text-xs text-gray-700">${timeLabel}</td>
                            <td class="px-3 py-2 whitespace-nowrap text-xs text-gray-700">${sp.unitMinutes}</td>
                            <td class="px-3 py-2 whitespace-nowrap text-xs text-gray-700">${(sp.price ?? 0).toLocaleString()}원</td>
                            <td class="px-3 py-2 whitespace-nowrap text-right text-xs">
                                <button type="button" class="text-indigo-600 hover:text-indigo-900 mr-2" onclick='editSpecial(${JSON.stringify(sp)})'>수정</button>
                                <button type="button" class="text-red-600 hover:text-red-900" onclick="deleteSpecial(${sp.id})">삭제</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(() => {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-3 py-4 text-center text-red-500 text-xs">특수 요금을 불러오지 못했습니다.</td></tr>';
                });
        }

        function openSpecialModal() {
            if (!ensureRoomSelected()) return;
            document.getElementById('specialId').value = '';
            document.getElementById('specialDate').value = '';
            document.getElementById('specialStartTime').value = '';
            document.getElementById('specialEndTime').value = '';
            document.getElementById('specialUnitMinutes').value = 60;
            document.getElementById('specialPrice').value = '';
            document.getElementById('specialModalTitle').textContent = '특수 요금 등록';
            document.getElementById('specialModal').classList.remove('hidden');
            document.getElementById('specialModal').classList.add('flex');
        }

        function closeSpecialModal() {
            document.getElementById('specialModal').classList.add('hidden');
            document.getElementById('specialModal').classList.remove('flex');
        }

        function editSpecial(sp) {
            document.getElementById('specialId').value = sp.id;
            document.getElementById('specialDate').value = sp.date || '';
            document.getElementById('specialStartTime').value = (sp.startTime || '').substring(0, 5);
            document.getElementById('specialEndTime').value = (sp.endTime || '').substring(0, 5);
            document.getElementById('specialUnitMinutes').value = sp.unitMinutes ?? 60;
            document.getElementById('specialPrice').value = sp.price ?? '';
            document.getElementById('specialModalTitle').textContent = '특수 요금 수정';
            document.getElementById('specialModal').classList.remove('hidden');
            document.getElementById('specialModal').classList.add('flex');
        }

        function submitSpecialForm() {
            if (!ensureRoomSelected()) return;
            const id = document.getElementById('specialId').value;
            const date = document.getElementById('specialDate').value;
            const startTime = document.getElementById('specialStartTime').value;
            const endTime = document.getElementById('specialEndTime').value;
            const unitMinutes = parseInt(document.getElementById('specialUnitMinutes').value || '0', 10);
            const price = parseInt(document.getElementById('specialPrice').value || '0', 10);

            if (!date || !startTime || !endTime) {
                alert('날짜와 시작/종료 시간을 모두 입력해주세요.');
                return;
            }
            if (!unitMinutes || unitMinutes <= 0 || unitMinutes % 15 !== 0) {
                alert('단위(분)는 15분 단위로 입력해주세요.');
                return;
            }
            if (price < 0) {
                alert('가격은 0 이상이어야 합니다.');
                return;
            }

            const payload = {
                date,
                startTime: startTime + ':00',
                endTime: endTime + ':00',
                unitMinutes,
                price
            };

            const method = id ? 'PUT' : 'POST';
            const url = id
                ? `/admin/rental/rooms/${currentPricingRoomId}/pricing/special/${id}`
                : `/admin/rental/rooms/${currentPricingRoomId}/pricing/special`;

            fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify(payload)
            })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        alert('특수 요금이 저장되었습니다.');
                        closeSpecialModal();
                        loadSpecialPricing();
                    } else {
                        alert(result.error?.message || '특수 요금 저장에 실패했습니다.');
                    }
                })
                .catch(() => alert('특수 요금 저장 중 오류가 발생했습니다.'));
        }

        function deleteSpecial(id) {
            if (!ensureRoomSelected()) return;
            if (!confirm('해당 특수 요금을 삭제하시겠습니까?')) {
                return;
            }
            fetch(`/admin/rental/rooms/${currentPricingRoomId}/pricing/special/${id}`, {
                method: 'DELETE',
                credentials: 'same-origin'
            })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        alert('삭제되었습니다.');
                        loadSpecialPricing();
                    } else {
                        alert(result.error?.message || '삭제에 실패했습니다.');
                    }
                })
                .catch(() => alert('삭제 중 오류가 발생했습니다.'));
        }
    </script>
</div>
</body>
</html>
