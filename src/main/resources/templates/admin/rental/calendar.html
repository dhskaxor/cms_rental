<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>예약 관리 - 달력</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <style>
        .fc .fc-daygrid-day.fc-day-sat { background-color: #dbeafe; }
        .fc .fc-daygrid-day.fc-day-sun { background-color: #fee2e2; }
        .fc .fc-daygrid-day.fc-day-holiday { background-color: #fee2e2; }
        .fc .fc-daygrid-day.fc-day-closed { background-color: #dcfce7; }
        .fc-calendar-day.closed-only { display: flex; align-items: center; justify-content: center; min-height: 3rem; text-align: center; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">예약 관리 - 달력</h1>
                <p class="text-sm text-gray-500 mt-1">
                    장소와 룸을 선택하면, <span class="font-semibold">이번 달을 기준</span>으로 예약 현황을 달력에서 확인할 수 있습니다.
                </p>
            </div>
        </div>

        <div class="grid grid-cols-4 gap-6">
            <div class="col-span-1 space-y-4">
                <div class="bg-white shadow rounded-lg overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-200">
                        <h2 class="text-sm font-medium text-gray-700">장소</h2>
                    </div>
                    <ul id="calendarPlaceList" class="divide-y divide-gray-200 max-h-48 overflow-y-auto">
                        <li class="px-4 py-4 text-center text-gray-500 text-sm">로딩 중...</li>
                    </ul>
                </div>
                <div class="bg-white shadow rounded-lg overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-200">
                        <h2 class="text-sm font-medium text-gray-700">룸</h2>
                    </div>
                    <ul id="calendarRoomList" class="divide-y divide-gray-200 max-h-48 overflow-y-auto">
                        <li class="px-4 py-4 text-center text-gray-500 text-sm">먼저 장소를 선택하세요.</li>
                    </ul>
                </div>
                <div class="bg-white shadow rounded-lg overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-200">
                        <h2 class="text-sm font-medium text-gray-700">사용 방법</h2>
                    </div>
                    <div class="px-4 py-3 text-xs text-gray-600 space-y-2">
                        <p><span class="font-medium text-gray-700">예약 클릭</span> → 상세 정보 및 취소/승인/반려 처리</p>
                        <p class="text-[11px] text-gray-400">달력에서 이전/다음 월 이동 시 해당 월 예약을 자동 조회합니다.</p>
                    </div>
                </div>
            </div>

            <div class="col-span-3 bg-white shadow rounded-lg overflow-hidden">
                <div class="px-4 py-3 border-b border-gray-200">
                    <h2 class="text-sm font-medium text-gray-700">
                        <span id="calendarRoomTitle">장소와 룸을 선택해주세요.</span>
                    </h2>
                </div>
                <div class="p-4">
                    <div id="calendarEl"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 예약 상세 모달 -->
    <div id="reservationDetailModal" class="fixed inset-0 bg-gray-900 bg-opacity-40 z-40 hidden items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md">
            <div class="px-4 py-3 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-lg font-medium text-gray-900">예약 상세</h2>
                <button type="button" onclick="closeReservationDetailModal()" class="text-gray-400 hover:text-gray-600">&times;</button>
            </div>
            <div id="reservationDetailBody" class="px-4 py-5 text-sm text-gray-700 space-y-2"></div>
            <div id="reservationDetailActions" class="px-4 py-3 bg-gray-50 flex flex-wrap gap-2 rounded-b-lg">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales/ko.global.min.js"></script>
    <script>
        function formatPrice(n) {
            return n == null || n === '' ? '-' : Number(n).toLocaleString('ko-KR');
        }

        function toYearMonth(date) {
            return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
        }

        let currentPlaceId = null;
        let currentRoomId = null;
        let currentYearMonth = toYearMonth(new Date());
        let calendarDaysMap = {};
        let calendarInstance = null;
        let isLoadingCalendar = false;
        let skipDatesSet = false;

        document.addEventListener('DOMContentLoaded', () => {
            loadPlaces();
        });

        function loadPlaces() {
            const ul = document.getElementById('calendarPlaceList');
            ul.innerHTML = '<li class="px-4 py-4 text-center text-gray-500 text-sm">로딩 중...</li>';
            fetch('/admin/rental/places', { credentials: 'same-origin' })
                .then(r => r.json())
                .then(result => {
                    if (!result.success) {
                        ul.innerHTML = '<li class="px-4 py-4 text-center text-red-500 text-sm">장소를 불러오지 못했습니다.</li>';
                        return;
                    }
                    const places = result.data || [];
                    if (!places.length) {
                        ul.innerHTML = '<li class="px-4 py-4 text-center text-gray-500 text-sm">등록된 장소가 없습니다.</li>';
                        return;
                    }
                    ul.innerHTML = '';
                    places.forEach(p => {
                        const li = document.createElement('li');
                        li.className = 'px-4 py-3 cursor-pointer hover:bg-gray-50 text-sm';
                        li.innerHTML = `<span>${p.name}</span><span class="text-xs text-gray-400 ml-1">ID: ${p.id}</span>`;
                        li.onclick = () => selectPlace(p);
                        ul.appendChild(li);
                    });
                })
                .catch(() => {
                    ul.innerHTML = '<li class="px-4 py-4 text-center text-red-500 text-sm">장소를 불러오지 못했습니다.</li>';
                });
        }

        function selectPlace(place) {
            currentPlaceId = place.id;
            currentRoomId = null;
            document.getElementById('calendarRoomTitle').textContent = '룸을 선택해주세요.';
            const ul = document.getElementById('calendarRoomList');
            ul.innerHTML = '<li class="px-4 py-4 text-center text-gray-500 text-sm">로딩 중...</li>';
            fetch(`/admin/rental/rooms?placeId=${place.id}`, { credentials: 'same-origin' })
                .then(r => r.json())
                .then(result => {
                    if (!result.success) {
                        ul.innerHTML = '<li class="px-4 py-4 text-center text-red-500 text-sm">룸을 불러오지 못했습니다.</li>';
                        return;
                    }
                    const rooms = result.data || [];
                    ul.innerHTML = '';
                    rooms.forEach(rm => {
                        const li = document.createElement('li');
                        li.className = 'px-4 py-3 cursor-pointer hover:bg-gray-50 text-sm';
                        li.innerHTML = `<span>${rm.name}</span><span class="text-xs text-gray-400 ml-1">ID: ${rm.id}</span>`;
                        li.onclick = () => selectRoom(rm);
                        ul.appendChild(li);
                    });
                })
                .catch(() => {
                    ul.innerHTML = '<li class="px-4 py-4 text-center text-red-500 text-sm">룸을 불러오지 못했습니다.</li>';
                });
        }

        function selectRoom(room) {
            currentRoomId = room.id;
            currentYearMonth = toYearMonth(new Date());
            document.getElementById('calendarRoomTitle').textContent = `[${room.id}] ${room.name} 예약 현황`;
            fetchAndRender(currentYearMonth);
        }

        function fetchAndRender(yearMonth) {
            if (!currentPlaceId || !currentRoomId || isLoadingCalendar) return;
            isLoadingCalendar = true;
            currentYearMonth = yearMonth;

            const params = new URLSearchParams({
                placeId: currentPlaceId,
                roomId: currentRoomId,
                yearMonth: yearMonth
            });
            fetch(`/admin/rental/calendar?${params.toString()}`, { credentials: 'same-origin' })
                .then(r => r.json())
                .then(result => {
                    isLoadingCalendar = false;
                    if (!result.success) {
                        alert(result.error?.message || '달력 데이터를 불러오지 못했습니다.');
                        return;
                    }
                    const days = result.data || [];
                    calendarDaysMap = {};
                    days.forEach(d => { calendarDaysMap[d.date] = d; });
                    renderCalendar(yearMonth + '-01');
                })
                .catch(() => {
                    isLoadingCalendar = false;
                    alert('달력 데이터를 불러오지 못했습니다.');
                });
        }

        function buildDayContent(dateStr) {
            const day = calendarDaysMap[dateStr];
            if (!day) return '';
            if (day.dayType === 'CLOSED') {
                return '<div class="fc-calendar-day closed-only"><span class="text-sm font-medium text-gray-700">휴관일</span></div>';
            }
            if (day.holidayName) {
                let html = '<div class="fc-calendar-day">';
                html += '<div class="text-[10px] font-medium text-red-600 mb-0.5">' + day.holidayName + '</div>';
                const reservations = day.reservations || [];
                if (!reservations.length) {
                    html += '<div class="text-[10px] text-gray-500">예약 없음</div>';
                } else {
                    let total = 0;
                    reservations.forEach(r => {
                        total += r.totalPrice || 0;
                        html += `<div class="calendar-reservation cursor-pointer text-[10px] text-indigo-700 hover:bg-indigo-50 rounded px-0.5 -mx-0.5" onclick="event.stopPropagation(); openReservationDetail(${r.id})">${r.userName || '예약자'}: ${r.startTime}~${r.endTime}(${formatPrice(r.totalPrice)}원)</div>`;
                    });
                    html += `<div class="text-[10px] font-medium text-gray-700 mt-1 border-t border-gray-100 pt-0.5">총합계: ${formatPrice(total)}원</div>`;
                }
                html += '</div>';
                return html;
            }
            const reservations = day.reservations || [];
            if (!reservations.length) return '<div class="fc-calendar-day text-[10px] text-gray-500">예약 없음</div>';
            let html = '<div class="fc-calendar-day">';
            let total = 0;
            reservations.forEach(r => {
                total += r.totalPrice || 0;
                html += `<div class="calendar-reservation cursor-pointer text-[10px] text-indigo-700 hover:bg-indigo-50 rounded px-0.5 -mx-0.5" onclick="event.stopPropagation(); openReservationDetail(${r.id})">${r.userName || '예약자'}: ${r.startTime}~${r.endTime}(${formatPrice(r.totalPrice)}원)</div>`;
            });
            html += `<div class="text-[10px] font-medium text-gray-700 mt-1 border-t border-gray-100 pt-0.5">총합계: ${formatPrice(total)}원</div>`;
            html += '</div>';
            return html;
        }

        function renderCalendar(initialDate) {
            if (calendarInstance) {
                calendarInstance.destroy();
                calendarInstance = null;
            }
            const el = document.getElementById('calendarEl');
            if (!el) return;

            skipDatesSet = true;
            calendarInstance = new FullCalendar.Calendar(el, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                height: 'auto',
                initialDate: initialDate,
                datesSet(arg) {
                    if (skipDatesSet) {
                        skipDatesSet = false;
                        return;
                    }
                    if (!currentPlaceId || !currentRoomId || isLoadingCalendar) return;
                    const title = arg.view.title;
                    const match = title.match(/(\d{4})년\s+(\d{1,2})월/);
                    if (!match) return;
                    const ym = match[1] + '-' + match[2].padStart(2, '0');
                    if (ym === currentYearMonth) return;
                    fetchAndRender(ym);
                },
                dayCellDidMount(arg) {
                    const d = arg.date;
                    const dateStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                    const dayData = calendarDaysMap[dateStr];
                    const closed = dayData?.dayType === 'CLOSED';
                    const holiday = dayData?.holidayName;
                    if (closed) arg.el.classList.add('fc-day-closed');
                    else if (holiday) arg.el.classList.add('fc-day-holiday');
                    else {
                        const dow = arg.date.getDay();
                        if (dow === 6) arg.el.classList.add('fc-day-sat');
                        else if (dow === 0) arg.el.classList.add('fc-day-sun');
                    }
                    const wrap = document.createElement('div');
                    wrap.className = 'fc-calendar-day-wrap';
                    wrap.innerHTML = buildDayContent(dateStr);
                    const frame = arg.el.querySelector('.fc-daygrid-day-frame');
                    if (frame) frame.appendChild(wrap);
                }
            });
            calendarInstance.render();
        }

        function openReservationDetail(id) {
            fetch(`/admin/rental/reservations/${id}`, { credentials: 'same-origin' })
                .then(r => r.json())
                .then(result => {
                    if (!result.success) {
                        alert('예약 정보를 불러오지 못했습니다.');
                        return;
                    }
                    const r = result.data;
                    const startStr = (r.start || '').replace('T', ' ').substring(0, 16);
                    const endStr = (r.end || '').replace('T', ' ').substring(0, 16);
                    const statusMap = {
                        'REQUESTED': '승인대기',
                        'CONFIRMED': '승인',
                        'CANCELLED_BY_USER': '사용자 취소',
                        'REJECTED_BY_ADMIN': '관리자 반려',
                        'CANCELLED_BY_ADMIN': '관리자 취소'
                    };
                    document.getElementById('reservationDetailBody').innerHTML = `
                        <p><span class="font-medium text-gray-600">예약자:</span> ${r.userName || '-'}</p>
                        <p><span class="font-medium text-gray-600">기간:</span> ${startStr} ~ ${endStr}</p>
                        <p><span class="font-medium text-gray-600">금액:</span> ${formatPrice(r.totalPrice)}원</p>
                        <p><span class="font-medium text-gray-600">상태:</span> ${statusMap[r.status] || r.status}</p>
                        ${r.memo ? '<p><span class="font-medium text-gray-600">메모:</span> ' + r.memo + '</p>' : ''}
                    `;
                    const actions = document.getElementById('reservationDetailActions');
                    actions.innerHTML = '';
                    if (r.status === 'REQUESTED') {
                        addActionBtn(actions, '승인', 'bg-green-600 hover:bg-green-700', () => doReservationAction(id, 'confirm'));
                        addActionBtn(actions, '반려', 'bg-amber-600 hover:bg-amber-700', () => doReservationAction(id, 'reject'));
                    }
                    if (r.status === 'REQUESTED' || r.status === 'CONFIRMED') {
                        addActionBtn(actions, '취소', 'bg-red-600 hover:bg-red-700', () => doReservationAction(id, 'cancel'));
                    }
                    document.getElementById('reservationDetailModal').dataset.reservationId = id;
                    document.getElementById('reservationDetailModal').classList.remove('hidden');
                    document.getElementById('reservationDetailModal').classList.add('flex');
                })
                .catch(() => alert('예약 정보를 불러오지 못했습니다.'));
        }

        function addActionBtn(container, text, cls, onClick) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'px-4 py-2 rounded-md text-sm font-medium text-white ' + cls;
            btn.textContent = text;
            btn.onclick = onClick;
            container.appendChild(btn);
        }

        function doReservationAction(id, action) {
            const path = action === 'confirm' ? 'confirm' : action === 'reject' ? 'reject' : 'cancel';
            if (!confirm(action === 'confirm' ? '예약을 승인하시겠습니까?' : action === 'reject' ? '예약을 반려하시겠습니까?' : '예약을 취소하시겠습니까?')) return;
            fetch(`/admin/rental/reservations/${id}/${path}`, { method: 'POST', credentials: 'same-origin' })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        alert(action === 'confirm' ? '승인되었습니다.' : action === 'reject' ? '반려되었습니다.' : '취소되었습니다.');
                        closeReservationDetailModal();
                        if (currentPlaceId && currentRoomId) fetchAndRender(currentYearMonth);
                    } else {
                        alert(result.error?.message || '처리에 실패했습니다.');
                    }
                })
                .catch(() => alert('처리 중 오류가 발생했습니다.'));
        }

        function closeReservationDetailModal() {
            document.getElementById('reservationDetailModal').classList.add('hidden');
            document.getElementById('reservationDetailModal').classList.remove('flex');
        }
    </script>
</div>
</body>
</html>
