<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>예약 관리 - 목록</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">예약 관리 - 목록</h1>
                <p class="text-sm text-gray-500 mt-1">
                    날짜, 예약자명, 예약상태로 검색할 수 있습니다. 최신 예약이 위에 표시됩니다.
                </p>
            </div>
        </div>

        <!-- 검색 조건 -->
        <div class="bg-white shadow rounded-lg mb-6">
            <div class="px-4 py-4 flex flex-wrap gap-4 items-end">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">시작일</label>
                    <input id="searchFrom" type="date"
                           class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">종료일</label>
                    <input id="searchTo" type="date"
                           class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">예약자명</label>
                    <input id="searchUserName" type="text" placeholder="예약자명"
                           class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">예약상태</label>
                    <select id="searchStatus"
                            class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">전체</option>
                        <option value="REQUESTED">승인대기</option>
                        <option value="CONFIRMED">승인</option>
                        <option value="CANCELLED_BY_USER">사용자 취소</option>
                        <option value="REJECTED_BY_ADMIN">관리자 반려</option>
                        <option value="CANCELLED_BY_ADMIN">관리자 취소</option>
                    </select>
                </div>
                <button type="button" onclick="searchReservations()"
                        class="px-4 py-2 bg-indigo-600 text-white rounded-md text-sm font-medium hover:bg-indigo-700">
                    조회
                </button>
            </div>
        </div>

        <!-- 총 금액 -->
        <div id="totalAmountArea" class="hidden bg-indigo-50 border border-indigo-200 rounded-lg px-4 py-3 mb-4">
            <span class="text-sm font-medium text-indigo-800">검색된 총 금액: </span>
            <span id="totalAmountValue" class="text-lg font-bold text-indigo-900">0</span>
            <span class="text-sm text-indigo-700">원</span>
        </div>

        <!-- 테이블 -->
        <div class="bg-white shadow rounded-lg overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200 text-sm">
                    <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">날짜</th>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">예약자</th>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">룸ID</th>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">시간</th>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">금액</th>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">상태</th>
                        <th class="px-4 py-2 text-right text-xs font-medium text-gray-500 uppercase">관리</th>
                    </tr>
                    </thead>
                    <tbody id="reservationTableBody" class="bg-white divide-y divide-gray-200">
                    <tr>
                        <td colspan="7" class="px-4 py-8 text-center text-gray-500">조회 버튼을 눌러 검색해주세요.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 예약 상세 모달 -->
    <div id="reservationDetailModal" class="fixed inset-0 bg-gray-900 bg-opacity-40 z-40 hidden items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md">
            <div class="px-4 py-3 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-lg font-medium text-gray-900">예약 상세</h2>
                <button type="button" onclick="closeReservationDetailModal()" class="text-gray-400 hover:text-gray-600">&times;</button>
            </div>
            <div id="reservationDetailBody" class="px-4 py-5 text-sm text-gray-700 space-y-2"></div>
            <div id="reservationDetailActions" class="px-4 py-3 bg-gray-50 flex flex-wrap gap-2 rounded-b-lg">
            </div>
        </div>
    </div>

    <script>
        function formatPrice(n) {
            return n == null || n === '' ? '-' : Number(n).toLocaleString('ko-KR');
        }

        const statusMap = {
            'REQUESTED': '승인대기',
            'CONFIRMED': '승인',
            'CANCELLED_BY_USER': '사용자 취소',
            'REJECTED_BY_ADMIN': '관리자 반려',
            'CANCELLED_BY_ADMIN': '관리자 취소'
        };

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const from = new Date(today);
            from.setMonth(from.getMonth() - 1);
            const to = new Date(today);
            to.setMonth(to.getMonth() + 1);
            document.getElementById('searchFrom').value = from.toISOString().slice(0, 10);
            document.getElementById('searchTo').value = to.toISOString().slice(0, 10);
        });

        function searchReservations() {
            const from = document.getElementById('searchFrom').value;
            const to = document.getElementById('searchTo').value;
            const userName = document.getElementById('searchUserName').value?.trim() || '';
            const status = document.getElementById('searchStatus').value || '';

            const params = new URLSearchParams();
            if (from) params.set('from', from + 'T00:00:00');
            if (to) params.set('to', to + 'T23:59:59');
            if (userName) params.set('userName', userName);
            if (status) params.set('status', status);

            document.getElementById('reservationTableBody').innerHTML =
                '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-500">로딩 중...</td></tr>';

            fetch(`/admin/rental/reservations?${params.toString()}`, { credentials: 'same-origin' })
                .then(r => r.json())
                .then(result => {
                    if (!result.success) {
                        document.getElementById('reservationTableBody').innerHTML =
                            '<tr><td colspan="7" class="px-4 py-8 text-center text-red-500">검색에 실패했습니다.</td></tr>';
                        return;
                    }
                    const data = result.data || {};
                    const items = data.items || [];
                    const totalAmount = data.totalAmount || 0;

                    document.getElementById('totalAmountArea').classList.remove('hidden');
                    document.getElementById('totalAmountValue').textContent = formatPrice(totalAmount);

                    if (!items.length) {
                        document.getElementById('reservationTableBody').innerHTML =
                            '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-500">검색 결과가 없습니다.</td></tr>';
                        return;
                    }

                    const tbody = document.getElementById('reservationTableBody');
                    tbody.innerHTML = '';
                    items.forEach(r => {
                        const startStr = (r.start || '').replace('T', ' ').substring(0, 16);
                        const endStr = (r.end || '').replace('T', ' ').substring(11, 16);
                        const dateStr = (r.start || '').substring(0, 10);
                        const tr = document.createElement('tr');
                        tr.className = 'hover:bg-gray-50';
                        tr.innerHTML = `
                            <td class="px-4 py-2 text-gray-700">${dateStr}</td>
                            <td class="px-4 py-2 text-gray-700">${r.userName || '-'}</td>
                            <td class="px-4 py-2 text-gray-700">${r.roomId || '-'}</td>
                            <td class="px-4 py-2 text-gray-700">${startStr} ~ ${endStr}</td>
                            <td class="px-4 py-2 text-gray-700">${formatPrice(r.totalPrice)}원</td>
                            <td class="px-4 py-2"><span class="px-2 py-0.5 rounded text-xs font-medium ${getStatusClass(r.status)}">${statusMap[r.status] || r.status}</span></td>
                            <td class="px-4 py-2 text-right">
                                <button type="button" class="text-indigo-600 hover:text-indigo-900 text-xs mr-2" onclick="openReservationDetail(${r.id})">상세</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(() => {
                    document.getElementById('reservationTableBody').innerHTML =
                        '<tr><td colspan="7" class="px-4 py-8 text-center text-red-500">검색 중 오류가 발생했습니다.</td></tr>';
                });
        }

        function getStatusClass(status) {
            switch (status) {
                case 'REQUESTED': return 'bg-amber-100 text-amber-800';
                case 'CONFIRMED': return 'bg-green-100 text-green-800';
                case 'CANCELLED_BY_USER':
                case 'REJECTED_BY_ADMIN':
                case 'CANCELLED_BY_ADMIN': return 'bg-gray-100 text-gray-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        function openReservationDetail(id) {
            fetch(`/admin/rental/reservations/${id}`, { credentials: 'same-origin' })
                .then(r => r.json())
                .then(result => {
                    if (!result.success) {
                        alert('예약 정보를 불러오지 못했습니다.');
                        return;
                    }
                    const r = result.data;
                    const startStr = (r.start || '').replace('T', ' ').substring(0, 16);
                    const endStr = (r.end || '').replace('T', ' ').substring(0, 16);
                    document.getElementById('reservationDetailBody').innerHTML = `
                        <p><span class="font-medium text-gray-600">예약자:</span> ${r.userName || '-'}</p>
                        <p><span class="font-medium text-gray-600">룸ID:</span> ${r.roomId || '-'}</p>
                        <p><span class="font-medium text-gray-600">기간:</span> ${startStr} ~ ${endStr}</p>
                        <p><span class="font-medium text-gray-600">금액:</span> ${formatPrice(r.totalPrice)}원</p>
                        <p><span class="font-medium text-gray-600">상태:</span> ${statusMap[r.status] || r.status}</p>
                        ${r.memo ? '<p><span class="font-medium text-gray-600">메모:</span> ' + r.memo + '</p>' : ''}
                    `;
                    const actions = document.getElementById('reservationDetailActions');
                    actions.innerHTML = '';
                    if (r.status === 'REQUESTED') {
                        addActionBtn(actions, '승인', 'bg-green-600 hover:bg-green-700', () => doReservationAction(id, 'confirm'));
                        addActionBtn(actions, '반려', 'bg-amber-600 hover:bg-amber-700', () => doReservationAction(id, 'reject'));
                    }
                    if (r.status === 'REQUESTED' || r.status === 'CONFIRMED') {
                        addActionBtn(actions, '취소', 'bg-red-600 hover:bg-red-700', () => doReservationAction(id, 'cancel'));
                    }
                    document.getElementById('reservationDetailModal').classList.remove('hidden');
                    document.getElementById('reservationDetailModal').classList.add('flex');
                })
                .catch(() => alert('예약 정보를 불러오지 못했습니다.'));
        }

        function addActionBtn(container, text, cls, onClick) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'px-4 py-2 rounded-md text-sm font-medium text-white ' + cls;
            btn.textContent = text;
            btn.onclick = onClick;
            container.appendChild(btn);
        }

        function doReservationAction(id, action) {
            const path = action === 'confirm' ? 'confirm' : action === 'reject' ? 'reject' : 'cancel';
            if (!confirm(action === 'confirm' ? '예약을 승인하시겠습니까?' : action === 'reject' ? '예약을 반려하시겠습니까?' : '예약을 취소하시겠습니까?')) return;
            fetch(`/admin/rental/reservations/${id}/${path}`, { method: 'POST', credentials: 'same-origin' })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        alert(action === 'confirm' ? '승인되었습니다.' : action === 'reject' ? '반려되었습니다.' : '취소되었습니다.');
                        closeReservationDetailModal();
                        searchReservations();
                    } else {
                        alert(result.error?.message || '처리에 실패했습니다.');
                    }
                })
                .catch(() => alert('처리 중 오류가 발생했습니다.'));
        }

        function closeReservationDetailModal() {
            document.getElementById('reservationDetailModal').classList.add('hidden');
            document.getElementById('reservationDetailModal').classList.remove('flex');
        }
    </script>
</div>
</body>
</html>
