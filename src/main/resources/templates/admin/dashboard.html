<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>대시보드</title>
</head>
<body>
    <div layout:fragment="content">
        <!-- 5-1: 환영 메시지 -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-800">
                안녕하세요, <span th:text="${currentUser?.name ?: '관리자'}">관리자</span>님!
            </h1>
            <p class="text-gray-600 mt-1">CMS 관리자 대시보드에 오신 것을 환영합니다.</p>
        </div>

        <!-- 5-1, 5-2: 통계 카드 (아이콘 shrink-0, 고정 크기로 깨짐 방지) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-sm p-5 md:p-6">
                <div class="flex items-center justify-between gap-4">
                    <div class="min-w-0 flex-1">
                        <p class="text-sm font-medium text-gray-500">총 사용자</p>
                        <p class="text-2xl md:text-3xl font-bold text-gray-800 mt-1" th:text="${stats?.totalUsers ?: 0}">0</p>
                    </div>
                    <div class="w-11 h-11 shrink-0 bg-blue-100 rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5 shrink-0 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-5 md:p-6">
                <div class="flex items-center justify-between gap-4">
                    <div class="min-w-0 flex-1">
                        <p class="text-sm font-medium text-gray-500">총 게시글</p>
                        <p class="text-2xl md:text-3xl font-bold text-gray-800 mt-1" th:text="${stats?.totalPosts ?: 0}">0</p>
                    </div>
                    <div class="w-11 h-11 shrink-0 bg-green-100 rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5 shrink-0 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-5 md:p-6">
                <div class="flex items-center justify-between gap-4">
                    <div class="min-w-0 flex-1">
                        <p class="text-sm font-medium text-gray-500">총 댓글</p>
                        <p class="text-2xl md:text-3xl font-bold text-gray-800 mt-1" th:text="${stats?.totalComments ?: 0}">0</p>
                    </div>
                    <div class="w-11 h-11 shrink-0 bg-amber-100 rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5 shrink-0 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                        </svg>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-5 md:p-6">
                <div class="flex items-center justify-between gap-4">
                    <div class="min-w-0 flex-1">
                        <p class="text-sm font-medium text-gray-500">총 파일</p>
                        <p class="text-2xl md:text-3xl font-bold text-gray-800 mt-1" th:text="${stats?.totalFiles ?: 0}">0</p>
                    </div>
                    <div class="w-11 h-11 shrink-0 bg-purple-100 rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5 shrink-0 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- 5-3: 빠른 메뉴 (링크: users/new, boards/new, posts, audit-logs) -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">빠른 메뉴</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <a th:href="@{/admin/users/new}" class="flex flex-col items-center p-4 bg-gray-50 rounded-lg hover:bg-indigo-50 hover:ring-2 hover:ring-indigo-200 transition-all">
                    <svg class="w-6 h-6 shrink-0 text-indigo-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                    </svg>
                    <span class="text-sm font-medium text-gray-700">사용자 추가</span>
                </a>
                <a th:href="@{/admin/boards/new}" class="flex flex-col items-center p-4 bg-gray-50 rounded-lg hover:bg-indigo-50 hover:ring-2 hover:ring-indigo-200 transition-all">
                    <svg class="w-6 h-6 shrink-0 text-indigo-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span class="text-sm font-medium text-gray-700">게시판 추가</span>
                </a>
                <a th:href="@{/admin/posts}" class="flex flex-col items-center p-4 bg-gray-50 rounded-lg hover:bg-indigo-50 hover:ring-2 hover:ring-indigo-200 transition-all">
                    <svg class="w-6 h-6 shrink-0 text-indigo-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
                    </svg>
                    <span class="text-sm font-medium text-gray-700">게시글 관리</span>
                </a>
                <a th:href="@{/admin/audit-logs}" class="flex flex-col items-center p-4 bg-gray-50 rounded-lg hover:bg-indigo-50 hover:ring-2 hover:ring-indigo-200 transition-all">
                    <svg class="w-6 h-6 shrink-0 text-indigo-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    <span class="text-sm font-medium text-gray-700">감사 로그</span>
                </a>
            </div>
        </div>

        <!-- 시스템 정보 -->
        <div class="bg-white rounded-xl shadow-sm p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">시스템 정보</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="flex justify-between py-2 border-b border-gray-100">
                    <span class="text-gray-600">CMS 버전</span>
                    <span class="font-medium text-gray-800">1.0.0</span>
                </div>
                <div class="flex justify-between py-2 border-b border-gray-100">
                    <span class="text-gray-600">Spring Boot</span>
                    <span class="font-medium text-gray-800">3.2.x</span>
                </div>
                <div class="flex justify-between py-2 border-b border-gray-100">
                    <span class="text-gray-600">Java 버전</span>
                    <span class="font-medium text-gray-800">17</span>
                </div>
                <div class="flex justify-between py-2 border-b border-gray-100">
                    <span class="text-gray-600">데이터베이스</span>
                    <span class="font-medium text-gray-800">MariaDB</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
