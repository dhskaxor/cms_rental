<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title th:text="${menu != null} ? '메뉴 수정' : '메뉴 등록'">메뉴</title>
</head>
<body>
    <div layout:fragment="content">
            <div class="max-w-3xl mx-auto">
                <!-- 헤더 -->
                <div class="mb-6">
                    <h1 class="text-2xl font-bold text-gray-800" th:text="${menu != null} ? '메뉴 수정' : '메뉴 등록'"></h1>
                </div>

                <!-- 폼 -->
                <form id="menuForm" class="bg-white rounded-lg shadow p-6 space-y-6">
                    <input type="hidden" id="menuId" th:value="${menu?.id}">
                    
                    <!-- 기본 정보 -->
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">메뉴명 *</label>
                            <input type="text" id="menuName" th:value="${menu?.menuName}" required
                                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">메뉴 코드 *</label>
                            <div class="flex gap-2">
                                <input type="text" id="menuCode" th:value="${menu?.menuCode}" required
                                       th:readonly="${menu != null}"
                                       class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                       th:classappend="${menu != null} ? 'bg-gray-100' : ''">
                                <button type="button" onclick="checkCode()" th:if="${menu == null}"
                                        class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">중복확인</button>
                            </div>
                            <p class="mt-1 text-sm text-gray-500">영문 소문자, 숫자, 하이픈, 언더스코어만 사용</p>
                        </div>
                    </div>

                    <!-- 상위 메뉴 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">상위 메뉴</label>
                        <select id="parentId" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">최상위 메뉴</option>
                            <option th:each="parent : ${parentMenus}" 
                                    th:value="${parent.id}" 
                                    th:text="${(parent.depth > 1 ? T(java.lang.String).valueOf('\u3000').repeat(parent.depth - 1) + '\u2514 ' : '') + (parent.menuName ?: '')}"
                                    th:selected="${menu != null && menu.parentId == parent.id}"></option>
                        </select>
                    </div>

                    <!-- 메뉴 유형 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">메뉴 유형 *</label>
                        <div class="flex gap-4">
                            <label class="flex items-center">
                                <input type="radio" name="menuType" value="PAGE" 
                                       th:checked="${menu == null || menu.menuType == 'PAGE'}" 
                                       onchange="toggleMenuType()" class="mr-2">
                                <span>페이지</span>
                            </label>
                            <label class="flex items-center">
                                <input type="radio" name="menuType" value="BOARD" 
                                       th:checked="${menu?.menuType == 'BOARD'}" 
                                       onchange="toggleMenuType()" class="mr-2">
                                <span>게시판</span>
                            </label>
                            <label class="flex items-center">
                                <input type="radio" name="menuType" value="LINK" 
                                       th:checked="${menu?.menuType == 'LINK'}" 
                                       onchange="toggleMenuType()" class="mr-2">
                                <span>외부 링크</span>
                            </label>
                            <label class="flex items-center">
                                <input type="radio" name="menuType" value="CUSTOM" 
                                       th:checked="${menu?.menuType == 'CUSTOM'}"
                                       onchange="toggleMenuType()" class="mr-2">
                                <span>커스텀</span>
                            </label>
                        </div>
                    </div>

                    <!-- 페이지 선택 (PAGE 타입) -->
                    <div id="pageSection">
                        <label class="block text-sm font-medium text-gray-700 mb-2">연결 페이지</label>
                        <select id="pageId" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">선택 안함</option>
                            <option th:each="page : ${pages}"
                                    th:value="${page.id}"
                                    th:text="${page.pageTitle}"
                                    th:data-page-code="${page.pageCode}"
                                    th:selected="${menu != null && menu.pageId == page.id}"></option>
                        </select>
                    </div>

                    <!-- 게시판 선택 (BOARD 타입) -->
                    <div id="boardSection" class="hidden">
                        <label class="block text-sm font-medium text-gray-700 mb-2">연결 게시판</label>
                        <select id="boardId" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">선택 안함</option>
                            <option th:each="board : ${boards}"
                                    th:value="${board.id}"
                                    th:text="${board.boardName}"
                                    th:data-board-code="${board.boardCode}"
                                    th:selected="${menu != null && menu.boardId == board.id}"></option>
                        </select>
                    </div>

                    <!-- 외부 링크 (LINK 타입) -->
                    <div id="linkSection" class="hidden">
                        <label class="block text-sm font-medium text-gray-700 mb-2">외부 링크 URL</label>
                        <input type="url" id="linkUrl" th:value="${menu?.linkUrl}"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="https://example.com">
                    </div>

                    <!-- URL 경로 -->
                    <div id="urlPathSection">
                        <label class="block text-sm font-medium text-gray-700 mb-2">URL 경로</label>
                        <input type="text" id="urlPath" th:value="${menu?.urlPath}"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="/about">
                    </div>

                    <!-- 추가 설정 -->
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">정렬 순서</label>
                            <input type="number" id="sortOrder" th:value="${menu?.sortOrder} ?: 0" min="0"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">링크 타겟</label>
                            <select id="target" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                <option value="_self" th:selected="${menu?.target == '_self' || menu?.target == null}">현재 창</option>
                                <option value="_blank" th:selected="${menu?.target == '_blank'}">새 창</option>
                            </select>
                        </div>
                    </div>

                    <!-- 노출 설정 -->
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="flex items-center">
                                <input type="checkbox" id="isVisible" th:checked="${menu?.isVisible != false}" class="mr-2">
                                <span class="text-sm font-medium text-gray-700">메뉴 노출</span>
                            </label>
                        </div>
                        <div>
                            <label class="flex items-center">
                                <input type="checkbox" id="isLoginRequired" th:checked="${menu?.isLoginRequired == true}" class="mr-2">
                                <span class="text-sm font-medium text-gray-700">로그인 필요</span>
                            </label>
                        </div>
                    </div>

                    <!-- SEO 설정 -->
                    <div class="border-t pt-6">
                        <h3 class="text-lg font-medium text-gray-800 mb-4">SEO 설정</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">SEO 제목</label>
                                <input type="text" id="seoTitle" th:value="${menu?.seoTitle}"
                                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">SEO 설명</label>
                                <textarea id="seoDescription" th:text="${menu?.seoDescription}" rows="2"
                                          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- 버튼 -->
                    <div class="flex justify-end gap-3 pt-4 border-t">
                        <a href="/admin/menus" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">취소</a>
                        <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">저장</button>
                    </div>
                </form>
            </div>

    <script th:inline="javascript">
        let codeChecked = [[${menu != null}]];

        const PAGE_URL_PREFIX = '/site/page/';
        const BOARD_URL_PREFIX = '/site/board/';

        const urlPathInput = document.getElementById('urlPath');
        const pageSelect = document.getElementById('pageId');
        const boardSelect = document.getElementById('boardId');
        const urlPathSection = document.getElementById('urlPathSection');

        function toggleMenuType() {
            const menuType = document.querySelector('input[name="menuType"]:checked').value;

            const isPage = menuType === 'PAGE';
            const isBoard = menuType === 'BOARD';
            const isLink = menuType === 'LINK';
            const isCustom = menuType === 'CUSTOM';

            document.getElementById('pageSection').classList.toggle('hidden', !isPage);
            document.getElementById('boardSection').classList.toggle('hidden', !isBoard);
            document.getElementById('linkSection').classList.toggle('hidden', !isLink);

            if (urlPathSection) {
                // PAGE, BOARD, CUSTOM 에서는 URL 경로 노출, LINK 에서는 숨김
                urlPathSection.classList.toggle('hidden', isLink);
            }

            updateUrlForContentMenu();
        }

        function updateUrlForContentMenu() {
            if (!urlPathInput) return;

            const menuType = document.querySelector('input[name="menuType"]:checked').value;

            if (menuType === 'PAGE') {
                const selected = pageSelect && pageSelect.selectedIndex >= 0
                    ? pageSelect.options[pageSelect.selectedIndex]
                    : null;
                const pageCode = selected ? selected.dataset.pageCode : '';
                urlPathInput.value = pageCode ? PAGE_URL_PREFIX + pageCode : PAGE_URL_PREFIX;
                urlPathInput.readOnly = true;
            } else if (menuType === 'BOARD') {
                const selected = boardSelect && boardSelect.selectedIndex >= 0
                    ? boardSelect.options[boardSelect.selectedIndex]
                    : null;
                const boardCode = selected ? selected.dataset.boardCode : '';
                urlPathInput.value = boardCode ? BOARD_URL_PREFIX + boardCode : BOARD_URL_PREFIX;
                urlPathInput.readOnly = true;
            } else if (menuType === 'CUSTOM') {
                // 커스텀 타입은 URL 경로를 직접 입력
                urlPathInput.readOnly = false;
            } else {
                // LINK 등 기타 타입은 URL 경로를 자동으로 사용하지 않음
                urlPathInput.readOnly = false;
            }
        }

        function checkCode() {
            const code = document.getElementById('menuCode').value;
            if (!code) {
                alert('메뉴 코드를 입력하세요.');
                return;
            }
            
            fetch(`/api/v1/menus/check/code?menuCode=${encodeURIComponent(code)}`, { credentials: 'same-origin' })
                .then(response => response.json())
                .then(data => {
                    const exists = data.data === true;
                    if (exists) {
                        alert('이미 사용 중인 메뉴 코드입니다.');
                        codeChecked = false;
                    } else {
                        alert('사용 가능한 메뉴 코드입니다.');
                        codeChecked = true;
                    }
                });
        }

        document.getElementById('menuForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const menuId = document.getElementById('menuId').value;
            if (!menuId && !codeChecked) {
                alert('메뉴 코드 중복 확인을 해주세요.');
                return;
            }
            
            const data = {
                parentId: document.getElementById('parentId').value || null,
                menuName: document.getElementById('menuName').value,
                menuCode: document.getElementById('menuCode').value,
                menuType: document.querySelector('input[name="menuType"]:checked').value,
                urlPath: document.getElementById('urlPath').value || null,
                linkUrl: document.getElementById('linkUrl').value || null,
                boardId: document.getElementById('boardId').value || null,
                pageId: document.getElementById('pageId').value || null,
                target: document.getElementById('target').value,
                sortOrder: parseInt(document.getElementById('sortOrder').value) || 0,
                isVisible: document.getElementById('isVisible').checked,
                isLoginRequired: document.getElementById('isLoginRequired').checked,
                seoTitle: document.getElementById('seoTitle').value || null,
                seoDescription: document.getElementById('seoDescription').value || null
            };
            
            const url = menuId ? `/api/v1/menus/${menuId}` : '/api/v1/menus';
            const method = menuId ? 'PUT' : 'POST';
            
            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    alert('저장되었습니다.');
                    location.href = '/admin/menus';
                } else {
                    alert(result.error?.message || '저장에 실패했습니다.');
                }
            })
            .catch(error => {
                alert('저장 중 오류가 발생했습니다.');
            });
        });

        if (pageSelect) {
            pageSelect.addEventListener('change', function () {
                updateUrlForContentMenu();
            });
        }

        if (boardSelect) {
            boardSelect.addEventListener('change', function () {
                updateUrlForContentMenu();
            });
        }

        document.querySelectorAll('input[name="menuType"]').forEach(function (radio) {
            radio.addEventListener('change', function () {
                toggleMenuType();
            });
        });

        // 초기 상태 설정
        toggleMenuType();
    </script>
    </div>
</body>
</html>
