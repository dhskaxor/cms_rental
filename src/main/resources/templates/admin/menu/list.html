<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>메뉴 관리</title>
</head>
<body>
    <div layout:fragment="content">
            <div class="max-w-6xl mx-auto">
                <!-- 헤더 -->
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-bold text-gray-800">메뉴 관리</h1>
                    <a href="/admin/menus/new" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                        + 메뉴 추가
                    </a>
                </div>

                <!-- 메뉴 목록 테이블 -->
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">메뉴명</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">코드</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">유형</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">URL</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">노출</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">정렬</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">관리</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200">
                            <tr th:each="menu : ${menus}" class="hover:bg-gray-50">
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span th:style="'padding-left: ' + ${(menu.depth - 1) * 20} + 'px'" class="flex items-center">
                                        <span th:if="${menu.depth > 1}" class="text-gray-400 mr-2">└</span>
                                        <span th:if="${menu.icon}" th:class="${menu.icon}" class="mr-2"></span>
                                        <span th:text="${menu.menuName}" class="font-medium text-gray-900"></span>
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span th:text="${menu.menuCode}" class="text-sm text-gray-600"></span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span th:switch="${menu.menuType}">
                                        <span th:case="'PAGE'" class="px-2 py-1 text-xs font-medium bg-green-100 text-green-800 rounded-full">페이지</span>
                                        <span th:case="'BOARD'" class="px-2 py-1 text-xs font-medium bg-blue-100 text-blue-800 rounded-full">게시판</span>
                                        <span th:case="'LINK'" class="px-2 py-1 text-xs font-medium bg-purple-100 text-purple-800 rounded-full">링크</span>
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span th:if="${menu.menuType == 'LINK'}" th:text="${menu.linkUrl}" class="text-sm text-gray-600"></span>
                                    <span th:if="${menu.menuType != 'LINK'}" th:text="${menu.urlPath}" class="text-sm text-gray-600"></span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span th:if="${menu.isVisible}" class="px-2 py-1 text-xs font-medium bg-green-100 text-green-800 rounded-full">노출</span>
                                    <span th:unless="${menu.isVisible}" class="px-2 py-1 text-xs font-medium bg-gray-100 text-gray-800 rounded-full">숨김</span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${menu.sortOrder}"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                    <a th:href="@{'/admin/menus/' + ${menu.id} + '/edit'}" class="text-blue-600 hover:text-blue-900 mr-3">수정</a>
                                    <button th:data-id="${menu.id}" th:data-name="${menu.menuName}" th:data-children="${menu.childCount}"
                                            onclick="deleteMenu(this)" class="text-red-600 hover:text-red-900">삭제</button>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(menus)}">
                                <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                                    등록된 메뉴가 없습니다.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

    <script th:inline="javascript">
        function deleteMenu(button) {
            const id = button.dataset.id;
            const name = button.dataset.name;
            const children = parseInt(button.dataset.children);
            
            if (children > 0) {
                alert('하위 메뉴가 있는 메뉴는 삭제할 수 없습니다.');
                return;
            }
            
            if (!confirm('선택한 메뉴를 삭제하시겠습니까?')) {
                return;
            }
            
            fetch(`/api/v1/menus/${id}`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('삭제되었습니다.');
                    location.reload();
                } else {
                    alert(data.error?.message || '삭제에 실패했습니다.');
                }
            })
            .catch(error => {
                alert('삭제 중 오류가 발생했습니다.');
            });
        }
    </script>
    </div>
</body>
</html>
