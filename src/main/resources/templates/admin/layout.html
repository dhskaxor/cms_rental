<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - CMS 관리자">CMS 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .header-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #6d28d9 100%);
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2), 0 2px 4px -2px rgba(79, 70, 229, 0.15);
        }
        .header-link:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }
        .logout-btn:hover {
            background-color: rgba(239, 68, 68, 0.9);
        }
        .menu-item {
            transition: all 0.15s ease;
            color: #374151;
        }
        .menu-item:hover {
            background-color: #f3f4f6;
            color: #4f46e5;
        }
        .menu-item:hover svg,
        .menu-item.active svg {
            color: inherit;
        }
        .menu-item.active {
            background: linear-gradient(90deg, #eef2ff 0%, #e0e7ff 100%);
            color: #4f46e5;
            font-weight: 600;
            border-left: 3px solid #4f46e5;
            margin-left: -3px;
            padding-left: calc(0.75rem + 3px);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 상단 헤더: 좌측 제목 / 우측 로그인 사용자 (3-1~3-5) -->
    <header class="header-gradient h-16 flex items-center justify-between px-6">
        <div class="flex items-center gap-8">
            <a th:href="@{/admin}" class="header-link flex items-center gap-2 px-3 py-2 rounded-lg text-white font-bold text-xl tracking-tight transition-colors">
                <svg class="w-7 h-7 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 6h6m-3-3v6m3-3l-3 3m0 0l-3-3m3 3v6"></path>
                </svg>
                CMS Admin
            </a>
            <span class="text-indigo-100 font-medium text-sm px-4 py-1.5 rounded-full bg-white/10" th:text="${pageTitle ?: '대시보드'}">대시보드</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-3 px-4 py-2 rounded-lg bg-white/10">
                <div class="w-9 h-9 rounded-full bg-white/20 flex items-center justify-center shrink-0">
                    <span class="text-white font-semibold text-sm" th:text="${#strings.substring(currentUser?.name ?: 'U', 0, 1)}">A</span>
                </div>
                <div class="text-left">
                    <p class="text-white font-medium text-sm leading-tight" th:text="${currentUser?.name ?: '사용자'}">관리자</p>
                    <p class="text-indigo-200 text-xs leading-tight" th:text="${currentUser?.roleCode ?: 'USER'}">ADMIN</p>
                </div>
            </div>
            <form th:action="@{/auth/logout}" method="post" class="inline">
                <button type="submit" class="logout-btn flex items-center gap-2 px-4 py-2 rounded-lg text-white text-sm font-medium bg-red-500/80 hover:bg-red-600 transition-colors">
                    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                    </svg>
                    로그아웃
                </button>
            </form>
        </div>
    </header>

    <div class="flex">
        <!-- 좌측 메뉴 (4단계: 아이콘, 18.2 순서, 호버, 활성 하이라이트) -->
        <aside class="w-60 bg-white border-r border-gray-200 min-h-[calc(100vh-3.5rem)] py-5 shadow-sm">
            <nav class="space-y-0.5 px-3">
                <!-- 18.2 메뉴 순서 -->
                <a th:href="@{/admin}" th:classappend="${currentMenu == 'dashboard'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    <span>대시보드</span>
                </a>
                <a th:href="@{/admin/site}" th:classappend="${currentMenu == 'site'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                    <span>사이트 관리</span>
                </a>
                <a th:href="@{/admin/roles}" th:classappend="${currentMenu == 'roles'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    <span>역할 관리</span>
                </a>
                <a th:href="@{/admin/users}" th:classappend="${currentMenu == 'users'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <span>사용자 관리</span>
                </a>
                <a th:href="@{/admin/menus}" th:classappend="${currentMenu == 'menus'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
                    <span>메뉴 관리</span>
                </a>
                <a th:href="@{/admin/pages}" th:classappend="${currentMenu == 'pages'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span>페이지 관리</span>
                </a>
                <a th:href="@{/admin/boards}" th:classappend="${currentMenu == 'boards'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    <span>게시판 관리</span>
                </a>
                <a th:href="@{/admin/posts}" th:classappend="${currentMenu == 'posts'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                    <span>게시글 관리</span>
                </a>
                <a th:href="@{/admin/common-codes}" th:classappend="${currentMenu == 'commoncodes'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    <span>공통 코드</span>
                </a>
                <a th:href="@{/admin/popups}" th:classappend="${currentMenu == 'popups'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                    <span>팝업 관리</span>
                </a>
                <a th:href="@{/admin/files}" th:classappend="${currentMenu == 'files'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    <span>파일 관리</span>
                </a>
                <!-- Rental module menus -->
                <a th:href="@{/admin/rental/places/view}" th:classappend="${currentMenu == 'rental-places'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M3 7a2 2 0 012-2h3l2-2h4l2 2h3a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 12h6m-6 4h3"/>
                    </svg>
                    <span>렌탈 장소</span>
                </a>
                <a th:href="@{/admin/rental/rooms/view}" th:classappend="${currentMenu == 'rental-rooms'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 6h16M4 10h16M4 14h10M4 18h6"/>
                    </svg>
                    <span>렌탈 룸</span>
                </a>
                <a th:href="@{/admin/rental/pricing/view}" th:classappend="${currentMenu == 'rental-pricing'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 8c-2.21 0-4 .895-4 2s1.79 2 4 2 4 .895 4 2-1.79 2-4 2m0-8c2.21 0 4 .895 4 2M12 8V6m0 10v2"/>
                    </svg>
                    <span>렌탈 요금</span>
                </a>
                <a th:href="@{/admin/rental/calendar/view}" th:classappend="${currentMenu == 'rental-calendar'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2M5 11h14M5 9a2 2 0 012-2h10a2 2 0 012 2v9a2 2 0 01-2 2H7a2 2 0 01-2-2V9z"/>
                    </svg>
                    <span>예약 관리 - 달력</span>
                </a>
                <a th:href="@{/admin/rental/reservations/view}" th:classappend="${currentMenu == 'rental-reservations'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                    </svg>
                    <span>예약 관리 - 목록</span>
                </a>
                <a th:href="@{/admin/audit-logs}" th:classappend="${currentMenu == 'audit'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                    <span>감사 로그</span>
                </a>
                <a th:href="@{/admin/settings}" th:classappend="${currentMenu == 'settings'} ? 'active' : ''"
                   class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg">
                    <svg class="w-5 h-5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span>설정</span>
                </a>
            </nav>
        </aside>

        <!-- 메인 컨텐츠 -->
        <main class="flex-1 p-6">
            <div layout:fragment="content">
                <!-- 페이지별 컨텐츠가 여기에 삽입됨 -->
            </div>
        </main>
    </div>
</body>
</html>
