<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title th:text="${group != null} ? '그룹 수정' : '그룹 생성'">게시판 그룹</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="max-w-xl mx-auto">
        <div class="mb-6">
            <a th:href="@{/admin/boards/groups}" class="text-indigo-600 hover:text-indigo-900">&larr; 그룹 목록</a>
        </div>

        <div class="bg-white shadow sm:rounded-lg">
            <div class="px-4 py-5 sm:px-6">
                <h3 class="text-lg leading-6 font-medium text-gray-900" th:text="${group != null} ? '그룹 수정' : '새 그룹 생성'"></h3>
            </div>

            <form id="groupForm" class="border-t border-gray-200">
                <input type="hidden" id="groupId" th:value="${group?.id}">
                
                <div class="px-4 py-5 sm:p-6 space-y-6">
                    <!-- 그룹 코드 -->
                    <div>
                        <label for="groupCode" class="block text-sm font-medium text-gray-700">그룹 코드 <span class="text-red-500">*</span></label>
                        <div class="mt-1 flex rounded-md shadow-sm">
                            <input type="text" id="groupCode" name="groupCode" th:value="${group?.groupCode}" 
                                   th:readonly="${group != null}"
                                   th:class="${group != null} ? 'bg-gray-100' : ''"
                                   class="flex-1 min-w-0 block w-full px-3 py-2 rounded-l-md border border-gray-300 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                                   placeholder="영문 소문자, 숫자, 언더스코어만 사용">
                            <button type="button" onclick="checkGroupCode()" th:if="${group == null}"
                                    class="inline-flex items-center px-3 py-2 border border-l-0 border-gray-300 bg-gray-50 text-gray-500 text-sm rounded-r-md hover:bg-gray-100">
                                중복확인
                            </button>
                        </div>
                        <p id="groupCodeMessage" class="mt-1 text-sm hidden"></p>
                    </div>

                    <!-- 그룹명 -->
                    <div>
                        <label for="groupName" class="block text-sm font-medium text-gray-700">그룹명 <span class="text-red-500">*</span></label>
                        <input type="text" id="groupName" name="groupName" th:value="${group?.groupName}"
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                               placeholder="그룹명을 입력하세요">
                    </div>
                </div>

                <div class="px-4 py-3 bg-gray-50 text-right sm:px-6">
                    <a th:href="@{/admin/boards/groups}" class="inline-flex justify-center py-2 px-4 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 mr-2">
                        취소
                    </a>
                    <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700">
                        <span th:text="${group != null} ? '수정' : '생성'">저장</span>
                    </button>
                </div>
            </form>
        </div>

    <script th:inline="javascript">
        let groupCodeChecked = [[${group != null}]];

        function checkGroupCode() {
            const groupCode = document.getElementById('groupCode').value;
            const messageEl = document.getElementById('groupCodeMessage');
            
            if (!groupCode) {
                messageEl.textContent = '그룹 코드를 입력해주세요.';
                messageEl.className = 'mt-1 text-sm text-red-600';
                return;
            }

            fetch(`/api/v1/board-groups/check/code?groupCode=${encodeURIComponent(groupCode)}`, { credentials: 'same-origin' })
                .then(response => response.json())
                .then(data => {
                    messageEl.classList.remove('hidden');
                    const isAvailable = data.data === false;
                    if (isAvailable) {
                        messageEl.textContent = '사용 가능한 코드입니다.';
                        messageEl.className = 'mt-1 text-sm text-green-600';
                        groupCodeChecked = true;
                    } else {
                        messageEl.textContent = '이미 사용 중인 코드입니다.';
                        messageEl.className = 'mt-1 text-sm text-red-600';
                        groupCodeChecked = false;
                    }
                });
        }

        document.getElementById('groupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const groupId = document.getElementById('groupId').value;
            const isEdit = !!groupId;

            if (!isEdit && !groupCodeChecked) {
                alert('그룹 코드 중복확인을 해주세요.');
                return;
            }

            const groupCode = document.getElementById('groupCode').value;
            const groupName = document.getElementById('groupName').value;

            if (!groupCode || !groupName) {
                alert('그룹 코드와 그룹명은 필수입니다.');
                return;
            }

            const data = isEdit ? { groupName: groupName } : { groupCode: groupCode, groupName: groupName };

            const url = isEdit ? `/api/v1/board-groups/${groupId}` : '/api/v1/board-groups';
            const method = isEdit ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data),
                credentials: 'same-origin'
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    alert(isEdit ? '그룹이 수정되었습니다.' : '그룹이 생성되었습니다.');
                    location.href = '/admin/boards/groups';
                } else {
                    alert(result.error?.message || '저장에 실패했습니다.');
                }
            })
            .catch(error => {
                alert('오류가 발생했습니다.');
            });
        });
    </script>
    </div>
</body>
</html>
