<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>게시판 관리</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">게시판 관리</h1>
            <div class="flex space-x-2">
                <a th:href="@{/admin/boards/groups}" class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                    그룹 관리
                </a>
                <a th:href="@{/admin/boards/new}" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                    + 새 게시판
                </a>
            </div>
        </div>

        <!-- 게시판 목록 테이블 -->
        <div class="bg-white shadow overflow-hidden sm:rounded-lg">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">게시판 코드</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">게시판명</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">그룹</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">설정</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">게시글</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">등록일</th>
                        <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">관리</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr th:each="board : ${boards}" th:object="${board}">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800" th:text="*{boardCode}"></span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <a th:href="@{'/admin/boards/' + *{id}}" class="text-indigo-600 hover:text-indigo-900 font-medium" th:text="*{boardName}"></a>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="*{groupName} ?: '없음'"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <span th:if="*{useComment}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800 mr-1">댓글</span>
                            <span th:if="*{useFile}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800 mr-1">파일</span>
                            <span th:if="*{useSecret}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-yellow-100 text-yellow-800">비밀글</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${(board.postCount != null ? board.postCount : 0) + '건'}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${board.createdAt != null ? #temporals.format(board.createdAt, 'yyyy-MM-dd') : '-'}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <a th:href="@{'/admin/boards/' + *{id} + '/edit'}" class="text-indigo-600 hover:text-indigo-900 mr-3">수정</a>
                            <button type="button" th:data-id="*{id}" th:data-name="*{boardName}" onclick="deleteBoard(this)" class="text-red-600 hover:text-red-900">삭제</button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(boards)}">
                        <td colspan="7" class="px-6 py-8 text-center text-gray-500">등록된 게시판이 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>
        </div>

    <script>
        function deleteBoard(element) {
            const id = element.dataset.id;
            const name = element.dataset.name;
            
            if (confirm('선택한 게시판을 삭제하시겠습니까?')) {
                fetch('/api/v1/boards/' + id, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('게시판이 삭제되었습니다.');
                        location.reload();
                    } else {
                        alert(data.error?.message || '삭제에 실패했습니다.');
                    }
                })
                .catch(error => {
                    alert('오류가 발생했습니다.');
                });
            }
        }
    </script>
    </div>
</body>
</html>
