<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>게시판 상세</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="max-w-7xl mx-auto">
        <div class="mb-6">
            <a href="/admin/boards" class="text-indigo-600 hover:text-indigo-900">&larr; 목록으로</a>
        </div>

        <div class="bg-white shadow overflow-hidden sm:rounded-lg">
            <div class="px-4 py-5 sm:px-6 flex justify-between items-center">
                <div>
                    <h3 class="text-lg leading-6 font-medium text-gray-900" th:text="${board.boardName}">게시판명</h3>
                    <p class="mt-1 max-w-2xl text-sm text-gray-500">게시판 상세 정보</p>
                </div>
                <div class="flex space-x-2">
                    <a th:href="@{'/admin/boards/' + ${board.id} + '/edit'}" class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                        수정
                    </a>
                    <button type="button" th:data-id="${board.id}" th:data-name="${board.boardName}" onclick="deleteBoard(this)" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700">
                        삭제
                    </button>
                </div>
            </div>
            <div class="border-t border-gray-200">
                <dl>
                    <div class="bg-gray-50 px-4 py-5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-6">
                        <dt class="text-sm font-medium text-gray-500">게시판 코드</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800" th:text="${board.boardCode}"></span>
                        </dd>
                    </div>
                    <div class="bg-white px-4 py-5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-6">
                        <dt class="text-sm font-medium text-gray-500">게시판명</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2" th:text="${board.boardName}"></dd>
                    </div>
                    <div class="bg-gray-50 px-4 py-5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-6">
                        <dt class="text-sm font-medium text-gray-500">그룹</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2" th:text="${board.groupName} ?: '없음'"></dd>
                    </div>
                    <div class="bg-white px-4 py-5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-6">
                        <dt class="text-sm font-medium text-gray-500">설정</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2">
                            <span th:if="${board.useComment}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800 mr-2">댓글 사용</span>
                            <span th:unless="${board.useComment}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-800 mr-2">댓글 미사용</span>
                            <span th:if="${board.useFile}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800 mr-2">파일 사용 (최대 [[${board.maxFileCount}]]개)</span>
                            <span th:unless="${board.useFile}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-800 mr-2">파일 미사용</span>
                            <span th:if="${board.useSecret}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-yellow-100 text-yellow-800">비밀글 사용</span>
                            <span th:unless="${board.useSecret}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-800">비밀글 미사용</span>
                        </dd>
                    </div>
                    <div class="bg-gray-50 px-4 py-5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-6">
                        <dt class="text-sm font-medium text-gray-500">페이지 크기</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2" th:text="|${board.pageSize}개|"></dd>
                    </div>
                    <div class="bg-white px-4 py-5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-6">
                        <dt class="text-sm font-medium text-gray-500">게시글 수</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2" th:text="|${board.postCount}건|"></dd>
                    </div>
                    <div class="bg-gray-50 px-4 py-5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-6">
                        <dt class="text-sm font-medium text-gray-500">등록일</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2" th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></dd>
                    </div>
                </dl>
            </div>
        </div>

        <!-- 권한 설정 -->
        <div class="mt-6 bg-white shadow overflow-hidden sm:rounded-lg" th:if="${board.permissions != null and !board.permissions.isEmpty()}">
            <div class="px-4 py-5 sm:px-6">
                <h3 class="text-lg leading-6 font-medium text-gray-900">역할별 권한</h3>
            </div>
            <div class="border-t border-gray-200">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">역할</th>
                            <th scope="col" class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">조회</th>
                            <th scope="col" class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">생성</th>
                            <th scope="col" class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">수정</th>
                            <th scope="col" class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">삭제</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <tr th:each="perm : ${board.permissions}">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${perm.roleName}"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-center">
                                <span th:if="${perm.canRead}" class="text-green-600">✓</span>
                                <span th:unless="${perm.canRead}" class="text-gray-300">-</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-center">
                                <span th:if="${perm.canCreate}" class="text-green-600">✓</span>
                                <span th:unless="${perm.canCreate}" class="text-gray-300">-</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-center">
                                <span th:if="${perm.canUpdate}" class="text-green-600">✓</span>
                                <span th:unless="${perm.canUpdate}" class="text-gray-300">-</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-center">
                                <span th:if="${perm.canDelete}" class="text-green-600">✓</span>
                                <span th:unless="${perm.canDelete}" class="text-gray-300">-</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    <script>
        function deleteBoard(element) {
            const id = element.dataset.id;
            const name = element.dataset.name;
            
            if (confirm('선택한 게시판을 삭제하시겠습니까?')) {
                fetch(`/api/v1/boards/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('게시판이 삭제되었습니다.');
                        location.href = '/admin/boards';
                    } else {
                        alert(data.error?.message || '삭제에 실패했습니다.');
                    }
                })
                .catch(error => {
                    alert('오류가 발생했습니다.');
                });
            }
        }
    </script>
    </div>
</body>
</html>
