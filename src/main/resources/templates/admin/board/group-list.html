<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>게시판 그룹 관리</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="max-w-7xl mx-auto">
        <div class="mb-6">
            <a th:href="@{/admin/boards}" class="text-indigo-600 hover:text-indigo-900">&larr; 게시판 목록</a>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-900">게시판 그룹 관리</h1>
            <a th:href="@{/admin/boards/groups/new}" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                + 새 그룹
            </a>
        </div>

        <!-- 그룹 목록 테이블 -->
        <div class="bg-white shadow overflow-hidden sm:rounded-lg">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">그룹 코드</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">그룹명</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">게시판 수</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">등록일</th>
                        <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">관리</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr th:each="group : ${groups}" th:object="${group}">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-purple-100 text-purple-800" th:text="*{groupCode}"></span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900" th:text="*{groupName}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${(group.boardCount != null ? group.boardCount : 0) + '개'}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${#temporals.format(group.createdAt, 'yyyy-MM-dd')}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <a th:href="@{'/admin/boards/groups/' + *{id} + '/edit'}" class="text-indigo-600 hover:text-indigo-900 mr-3">수정</a>
                            <button type="button" th:data-id="*{id}" th:data-name="*{groupName}" onclick="deleteGroup(this)" class="text-red-600 hover:text-red-900">삭제</button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(groups)}">
                        <td colspan="5" class="px-6 py-8 text-center text-gray-500">등록된 그룹이 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>

    <script>
        function deleteGroup(element) {
            const id = element.dataset.id;
            const name = element.dataset.name;
            
            if (confirm('선택한 그룹을 삭제하시겠습니까?')) {
                fetch('/api/v1/board-groups/' + id, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('그룹이 삭제되었습니다.');
                        location.reload();
                    } else {
                        alert(data.error?.message || '삭제에 실패했습니다.');
                    }
                })
                .catch(error => {
                    alert('오류가 발생했습니다.');
                });
            }
        }
    </script>
    </div>
    </div>
</body>
</html>
