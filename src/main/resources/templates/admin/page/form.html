<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title th:text="${page != null} ? '페이지 수정' : '페이지 등록'">페이지</title>
    <!-- Toast UI Editor -->
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
</head>
<body>
    <div layout:fragment="content">
            <div class="max-w-4xl mx-auto">
                <!-- 헤더 -->
                <div class="mb-6">
                    <h1 class="text-2xl font-bold text-gray-800" th:text="${page != null} ? '페이지 수정' : '페이지 등록'"></h1>
                </div>

                <!-- 폼 -->
                <form id="pageForm" class="bg-white rounded-lg shadow p-6 space-y-6">
                    <input type="hidden" id="pageId" th:value="${page?.id}">
                    
                    <!-- 기본 정보 -->
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">페이지 제목 *</label>
                            <input type="text" id="pageTitle" th:value="${page?.pageTitle}" required
                                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">페이지 코드 *</label>
                            <div class="flex gap-2">
                                <input type="text" id="pageCode" th:value="${page?.pageCode}" required
                                       th:readonly="${page != null}"
                                       class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                       th:classappend="${page != null} ? 'bg-gray-100' : ''">
                                <button type="button" onclick="checkCode()" th:if="${page == null}"
                                        class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">중복확인</button>
                            </div>
                            <p class="mt-1 text-sm text-gray-500">영문 소문자, 숫자, 하이픈, 언더스코어만 사용</p>
                        </div>
                    </div>

                    <!-- 템플릿 선택 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">템플릿</label>
                        <select id="templateCode" th:data-initial="${page?.templateCode != null ? page.templateCode : 'default'}"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="default">default</option>
                        </select>
                        <p class="mt-1 text-sm text-gray-500">templates/site/page/ 하위 폴더 기준. 사용자 사이트에서 해당 템플릿으로 렌더링됩니다.</p>
                    </div>

                    <!-- 게시 여부 -->
                    <div>
                        <label class="flex items-center">
                            <input type="checkbox" id="isPublished" th:checked="${page?.isPublished != false}" class="mr-2">
                            <span class="text-sm font-medium text-gray-700">페이지 게시</span>
                        </label>
                        <p class="mt-1 text-sm text-gray-500">체크하면 페이지가 공개됩니다.</p>
                    </div>

                    <!-- 콘텐츠 (Toast UI Editor) -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">페이지 내용</label>
                        <div id="pageEditorWrap" class="border border-gray-300 rounded-lg overflow-hidden"></div>
                        <p class="mt-1 text-sm text-gray-500">WYSIWYG 에디터. 이미지 삽입 시 자동 업로드됩니다.</p>
                    </div>

                    <!-- 버튼 -->
                    <div class="flex justify-end gap-3 pt-4 border-t">
                        <a href="/admin/pages" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">취소</a>
                        <button type="button" onclick="previewPage()" class="px-6 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">미리보기</button>
                        <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">저장</button>
                    </div>
                </form>
            </div>

    <!-- 미리보기 모달 -->
    <div id="previewModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-4xl max-h-[90vh] overflow-hidden">
            <div class="flex justify-between items-center px-6 py-4 border-b">
                <h3 class="text-lg font-medium">미리보기</h3>
                <button onclick="closePreview()" class="text-gray-500 hover:text-gray-700">&times;</button>
            </div>
            <div id="previewContent" class="p-6 overflow-y-auto max-h-[70vh]"></div>
        </div>
    </div>

    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    <script th:inline="javascript">
        let codeChecked = [[${page != null}]];
        var pageToastEditor = null;

        // 페이지 로드 시 템플릿 목록 로드 및 Toast UI Editor 초기화
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/v1/pages/templates', { credentials: 'same-origin' })
                .then(r => r.json())
                .then(res => {
                    if (res.success && Array.isArray(res.data)) {
                        const sel = document.getElementById('templateCode');
                        sel.innerHTML = res.data.map(c => '<option value="' + c + '">' + c + '</option>').join('');
                        const initial = sel.dataset.initial || 'default';
                        if (res.data.includes(initial)) sel.value = initial;
                    }
                });

            // Toast UI Editor 초기화
            var initialContent = /*[[${(page != null and page.content != null) ? page.content : ''}]]*/ '';
            var pageIdEl = document.getElementById('pageId');
            var refId = (pageIdEl && pageIdEl.value) ? parseInt(pageIdEl.value, 10) : 0;

            pageToastEditor = new toastui.Editor({
                el: document.querySelector('#pageEditorWrap'),
                height: '400px',
                initialEditType: 'wysiwyg',
                previewStyle: 'vertical',
                placeholder: '내용을 입력하세요.',
                initialValue: initialContent,
                hooks: {
                    addImageBlobHook: function(blob, callback) {
                        var formData = new FormData();
                        formData.append('file', blob);
                        fetch('/api/v1/files/upload?refType=PAGE&refId=' + refId, {
                            method: 'POST',
                            body: formData,
                            credentials: 'same-origin'
                        })
                        .then(function(r) { return r.json(); })
                        .then(function(res) {
                            if (res.success && res.data) {
                                callback('/api/v1/public/files/' + res.data.id + '/image', blob.name || 'image');
                            } else {
                                alert(res.error?.message || '이미지 업로드에 실패했습니다.');
                            }
                        })
                        .catch(function() { alert('이미지 업로드 중 오류가 발생했습니다.'); });
                    }
                }
            });
        });

        function checkCode() {
            const code = document.getElementById('pageCode').value;
            if (!code) {
                alert('페이지 코드를 입력하세요.');
                return;
            }
            
            fetch(`/api/v1/pages/check/code?pageCode=${encodeURIComponent(code)}`, { credentials: 'same-origin' })
                .then(response => response.json())
                .then(data => {
                    const exists = data.data === true;
                    if (exists) {
                        alert('이미 사용 중인 페이지 코드입니다.');
                        codeChecked = false;
                    } else {
                        alert('사용 가능한 페이지 코드입니다.');
                        codeChecked = true;
                    }
                });
        }

        function previewPage() {
            var content = pageToastEditor ? pageToastEditor.getHTML() : '';
            document.getElementById('previewContent').innerHTML = content;
            document.getElementById('previewModal').classList.remove('hidden');
        }

        function closePreview() {
            document.getElementById('previewModal').classList.add('hidden');
        }

        document.getElementById('pageForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const pageId = document.getElementById('pageId').value;
            if (!pageId && !codeChecked) {
                alert('페이지 코드 중복 확인을 해주세요.');
                return;
            }
            
            var contentValue = pageToastEditor ? pageToastEditor.getHTML() : '';
            const data = {
                pageCode: document.getElementById('pageCode').value,
                pageTitle: document.getElementById('pageTitle').value,
                templateCode: document.getElementById('templateCode').value || 'default',
                content: contentValue,
                isPublished: document.getElementById('isPublished').checked
            };
            
            const url = pageId ? `/api/v1/pages/${pageId}` : '/api/v1/pages';
            const method = pageId ? 'PUT' : 'POST';
            
            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    alert('저장되었습니다.');
                    location.href = '/admin/pages';
                } else {
                    alert(result.error?.message || '저장에 실패했습니다.');
                }
            })
            .catch(error => {
                alert('저장 중 오류가 발생했습니다.');
            });
        });

        // ESC 키로 모달 닫기
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closePreview();
            }
        });
    </script>
    </div>
</body>
</html>
