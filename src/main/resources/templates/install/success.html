<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Core - 설치 완료</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="bg-white rounded-xl shadow-lg p-8 text-center">
            <!-- Success Icon -->
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>

            <!-- Title -->
            <h1 class="text-2xl font-bold text-gray-900 mb-2">설치가 완료되었습니다!</h1>
            <p class="text-gray-600 mb-8">CMS Core 플랫폼이 성공적으로 설치되었습니다.</p>

            <!-- Info Box -->
            <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-8 text-left">
                <div class="flex gap-3">
                    <svg class="w-5 h-5 text-yellow-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    <div>
                        <h4 class="font-medium text-yellow-800">중요!</h4>
                        <p class="text-sm text-yellow-700 mt-1">
                            서버를 재시작해야 새로운 설정이 적용됩니다.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Next Steps -->
            <div class="text-left mb-8">
                <h3 class="font-medium text-gray-900 mb-3">다음 단계</h3>
                <ol class="text-sm text-gray-600 space-y-2">
                    <li class="flex items-start gap-2">
                        <span class="bg-primary text-white text-xs w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">1</span>
                        <span><code class="bg-gray-100 px-1 rounded">cms-config.yml</code> 파일을 <code class="bg-gray-100 px-1 rounded">application.yml</code>에 반영</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <span class="bg-primary text-white text-xs w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">2</span>
                        <span>서버 재시작</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <span class="bg-primary text-white text-xs w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">3</span>
                        <span>관리자 계정으로 로그인</span>
                    </li>
                </ol>
            </div>

            <!-- Config File Info -->
            <div class="bg-gray-50 rounded-lg p-4 text-left">
                <h4 class="font-medium text-gray-900 mb-2">생성된 설정 파일</h4>
                <code class="text-sm text-gray-600 block bg-gray-100 p-3 rounded">
                    cms-config.yml
                </code>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-sm text-gray-500 mt-6">
            CMS Core Platform &copy; 2026
        </p>
    </div>

    <style>
        .bg-primary { background-color: #3b82f6; }
    </style>
</body>
</html>
