<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{install/layout :: layout(~{::content})}">
<th:block th:fragment="content">
    <div class="bg-white rounded-xl shadow-sm border p-8">
        <!-- Header -->
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">사이트 설정</h2>
            <p class="text-gray-600">기본 사이트 설정을 입력해주세요.</p>
        </div>

        <!-- Alert Messages -->
        <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
            <p class="text-red-700" th:text="${error}"></p>
        </div>
        <div th:if="${success}" class="mb-6 p-4 bg-green-50 border border-green-200 rounded-lg">
            <p class="text-green-700" th:text="${success}"></p>
        </div>

        <!-- Form -->
        <form th:action="@{/install/step4}" th:object="${siteConfig}" method="post">
            <div class="space-y-6">
                <!-- Site Name -->
                <div>
                    <label class="label-text" for="siteName">사이트명</label>
                    <input type="text" id="siteName" th:field="*{siteName}" 
                           class="input-field" placeholder="CMS Core">
                    <p th:if="${#fields.hasErrors('siteName')}" 
                       th:errors="*{siteName}" class="mt-1 text-sm text-red-600"></p>
                    <p class="mt-1 text-sm text-gray-500">브라우저 타이틀 등에 표시됩니다.</p>
                </div>

                <!-- Upload Path -->
                <div>
                    <label class="label-text" for="uploadPath">파일 업로드 경로</label>
                    <input type="text" id="uploadPath" th:field="*{uploadPath}" 
                           class="input-field" placeholder="C:/cms/files">
                    <p th:if="${#fields.hasErrors('uploadPath')}" 
                       th:errors="*{uploadPath}" class="mt-1 text-sm text-red-600"></p>
                    <p class="mt-1 text-sm text-gray-500">업로드된 파일이 저장될 경로입니다.</p>
                </div>
            </div>

            <!-- Info Box -->
            <div class="mt-6 p-4 bg-blue-50 border border-blue-200 rounded-lg">
                <h4 class="font-medium text-blue-900 mb-2">💡 파일 저장 정보</h4>
                <ul class="text-sm text-blue-800 space-y-1">
                    <li>• 허용 확장자: 이미지(jpg, png, gif, webp), 문서(pdf, doc, docx, xls, xlsx, hwp)</li>
                    <li>• 최대 파일 크기: 3MB</li>
                    <li>• 해당 경로에 쓰기 권한이 필요합니다.</li>
                </ul>
            </div>

            <!-- Buttons -->
            <div class="flex items-center justify-between mt-8 pt-6 border-t">
                <a th:href="@{/install/step3}" class="btn-secondary">
                    <span class="mr-1">←</span>
                    이전 단계
                </a>
                <button type="submit" class="btn-primary">
                    다음 단계
                    <span class="ml-1">→</span>
                </button>
            </div>
        </form>
    </div>
</th:block>
</html>
