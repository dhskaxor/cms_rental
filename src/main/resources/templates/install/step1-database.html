<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{install/layout :: layout(~{::content})}">
<th:block th:fragment="content">
    <div class="bg-white rounded-xl shadow-sm border p-8">
        <!-- Header -->
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">데이터베이스 연결</h2>
            <p class="text-gray-600">MariaDB 데이터베이스 연결 정보를 입력해주세요.</p>
        </div>

        <!-- Alert Messages -->
        <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
            <p class="text-red-700" th:text="${error}"></p>
        </div>
        <div th:if="${success}" class="mb-6 p-4 bg-green-50 border border-green-200 rounded-lg">
            <p class="text-green-700" th:text="${success}"></p>
        </div>

        <!-- Form -->
        <form th:action="@{/install/step1}" th:object="${databaseConfig}" method="post">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Host -->
                <div>
                    <label class="label-text" for="host">호스트</label>
                    <input type="text" id="host" th:field="*{host}" 
                           class="input-field" placeholder="localhost">
                    <p th:if="${#fields.hasErrors('host')}" 
                       th:errors="*{host}" class="mt-1 text-sm text-red-600"></p>
                </div>

                <!-- Port -->
                <div>
                    <label class="label-text" for="port">포트</label>
                    <input type="number" id="port" th:field="*{port}" 
                           class="input-field" placeholder="3306">
                    <p th:if="${#fields.hasErrors('port')}" 
                       th:errors="*{port}" class="mt-1 text-sm text-red-600"></p>
                </div>

                <!-- Database Name -->
                <div>
                    <label class="label-text" for="databaseName">데이터베이스 이름</label>
                    <input type="text" id="databaseName" th:field="*{databaseName}" 
                           class="input-field" placeholder="cms">
                    <p th:if="${#fields.hasErrors('databaseName')}" 
                       th:errors="*{databaseName}" class="mt-1 text-sm text-red-600"></p>
                </div>

                <!-- Username -->
                <div>
                    <label class="label-text" for="username">사용자명</label>
                    <input type="text" id="username" th:field="*{username}" 
                           class="input-field" placeholder="root">
                    <p th:if="${#fields.hasErrors('username')}" 
                       th:errors="*{username}" class="mt-1 text-sm text-red-600"></p>
                </div>

                <!-- Password -->
                <div class="md:col-span-2">
                    <label class="label-text" for="password">비밀번호</label>
                    <input type="password" id="password" th:field="*{password}" 
                           class="input-field" placeholder="비밀번호 입력">
                </div>
            </div>

            <!-- Connection Test Result -->
            <div id="connectionResult" class="hidden mt-6 p-4 rounded-lg"></div>

            <!-- Buttons -->
            <div class="flex items-center justify-between mt-8 pt-6 border-t">
                <button type="button" 
                        onclick="testConnection()" 
                        class="btn-secondary flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    연결 테스트
                </button>
                <button type="submit" class="btn-primary">
                    다음 단계
                    <span class="ml-1">→</span>
                </button>
            </div>
        </form>
    </div>

    <!-- Info Box -->
    <div class="mt-6 p-4 bg-blue-50 border border-blue-200 rounded-lg">
        <h3 class="font-medium text-blue-900 mb-2">💡 참고사항</h3>
        <ul class="text-sm text-blue-800 space-y-1">
            <li>• 데이터베이스는 미리 생성되어 있어야 합니다.</li>
            <li>• MariaDB 10.5 이상 버전을 권장합니다.</li>
            <li>• 연결 테스트 후 다음 단계로 진행해주세요.</li>
        </ul>
    </div>

    <script th:inline="javascript">
        async function testConnection() {
            const resultDiv = document.getElementById('connectionResult');
            const form = document.querySelector('form');
            
            const data = {
                host: document.getElementById('host').value,
                port: parseInt(document.getElementById('port').value),
                databaseName: document.getElementById('databaseName').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            resultDiv.classList.remove('hidden', 'bg-green-50', 'bg-red-50');
            resultDiv.innerHTML = '<p class="text-gray-600">연결 테스트 중...</p>';
            resultDiv.classList.add('bg-gray-50');

            try {
                const response = await fetch('/install/api/test-connection', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                resultDiv.classList.remove('bg-gray-50');
                if (result.data.connected) {
                    resultDiv.classList.add('bg-green-50');
                    resultDiv.innerHTML = '<p class="text-green-700 font-medium">✓ ' + result.data.message + '</p>';
                } else {
                    resultDiv.classList.add('bg-red-50');
                    resultDiv.innerHTML = '<p class="text-red-700 font-medium">✗ ' + result.data.message + '</p>';
                }
            } catch (error) {
                resultDiv.classList.remove('bg-gray-50');
                resultDiv.classList.add('bg-red-50');
                resultDiv.innerHTML = '<p class="text-red-700 font-medium">✗ 연결 테스트 중 오류가 발생했습니다.</p>';
            }
        }
    </script>
</th:block>
</html>
