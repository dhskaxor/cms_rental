<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{install/layout :: layout(~{::content})}">
<th:block th:fragment="content">
    <div class="bg-white rounded-xl shadow-sm border p-8">
        <!-- Header -->
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">설치 완료</h2>
            <p class="text-gray-600">모든 설정이 완료되었습니다. 설치를 마무리합니다.</p>
        </div>

        <!-- Alert Messages -->
        <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
            <p class="text-red-700" th:text="${error}"></p>
        </div>

        <!-- Summary -->
        <div class="space-y-4">
            <h3 class="font-medium text-gray-900">설치 요약</h3>
            
            <!-- Checklist -->
            <div class="space-y-3">
                <div class="flex items-center gap-3 p-4 bg-green-50 rounded-lg">
                    <div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                    </div>
                    <div>
                        <p class="font-medium text-green-900">데이터베이스 연결</p>
                        <p class="text-sm text-green-700">연결 설정 완료</p>
                    </div>
                </div>

                <div class="flex items-center gap-3 p-4 bg-green-50 rounded-lg">
                    <div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                    </div>
                    <div>
                        <p class="font-medium text-green-900">테이블 생성</p>
                        <p class="text-sm text-green-700">모든 테이블 및 초기 데이터 생성 완료</p>
                    </div>
                </div>

                <div class="flex items-center gap-3 p-4 bg-green-50 rounded-lg">
                    <div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                    </div>
                    <div>
                        <p class="font-medium text-green-900">관리자 계정</p>
                        <p class="text-sm text-green-700">관리자 계정 생성 완료</p>
                    </div>
                </div>

                <div class="flex items-center gap-3 p-4 bg-green-50 rounded-lg">
                    <div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                    </div>
                    <div>
                        <p class="font-medium text-green-900">사이트 설정</p>
                        <p class="text-sm text-green-700">기본 설정 완료</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Info -->
        <div class="mt-8 p-4 bg-blue-50 border border-blue-200 rounded-lg">
            <h4 class="font-medium text-blue-900 mb-2">💡 완료 후 안내</h4>
            <ul class="text-sm text-blue-800 space-y-1">
                <li>• <code class="bg-blue-100 px-1 rounded">cms-config.yml</code> 파일이 생성됩니다.</li>
                <li>• 서버를 재시작한 후 설정이 적용됩니다.</li>
                <li>• 설치 완료 후 <code class="bg-blue-100 px-1 rounded">/install</code> 경로는 접근이 차단됩니다.</li>
            </ul>
        </div>

        <!-- Form -->
        <form th:action="@{/install/step5}" method="post">
            <div class="flex items-center justify-between mt-8 pt-6 border-t">
                <a th:href="@{/install/step4}" class="btn-secondary">
                    <span class="mr-1">←</span>
                    이전 단계
                </a>
                <button type="submit" class="btn-primary" onclick="this.disabled=true; this.innerHTML='완료 중...'; this.form.submit();">
                    설치 완료
                    <span class="ml-1">✓</span>
                </button>
            </div>
        </form>
    </div>
</th:block>
</html>
