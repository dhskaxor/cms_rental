# ==============================================
# CMS Core Platform - 개발 환경 설정
# ==============================================

spring:
  # H2 데이터베이스 (개발용)
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:cmsdev;MODE=MariaDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  
  # H2 콘솔 활성화
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  
  # Redis (개발 환경에서는 비활성화 - 인메모리 캐시 사용)
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: simple    # Redis 미사용 시 인메모리 캐시

# 로깅 (개발 환경에서 상세 로그)
logging:
  level:
    root: INFO
    com.nt.cms: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.mybatis.spring: DEBUG
    jdbc.sqltiming: DEBUG
