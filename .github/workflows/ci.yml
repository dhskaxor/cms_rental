name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: JDK 17 설정
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Gradle 권한 부여
      run: chmod +x gradlew

    - name: 빌드 및 테스트
      run: ./gradlew build -x test

    - name: JAR 아티팩트 업로드
      uses: actions/upload-artifact@v4
      with:
        name: build-artifact
        path: build/libs/*.jar

    # - name: 담당자 이메일 설정
    #   if: always()
