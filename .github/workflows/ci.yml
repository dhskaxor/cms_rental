    #     case "${{ github.actor }}" in
    #       "dhskaxor") echo "MAIL_TO=dhskaxor@gmail.com" >> $GITHUB_ENV ;;
    #       *) echo "MAIL_TO=${{ secrets.MAIL_ADMIN }}" >> $GITHUB_ENV ;;
    #     esac

    # - name: 성공 이메일 전송
    #   if: success()
    #   uses: dawidd6/action-send-mail@v3
    #   with:
    #     server_address: smtp.gmail.com
    #     server_port: 465
    #     username: ${{ secrets.MAIL_USERNAME }}
    #     password: ${{ secrets.MAIL_PASSWORD }}
    #     subject: "✅ [${{ github.repository }}] 빌드 성공"
    #     body: |
    #       ✅ 빌드 및 테스트 성공!
    #
    #       - 브랜치: ${{ github.ref_name }}
    #       - 커밋: ${{ github.sha }}
    #       - 작성자: ${{ github.actor }}
    #       - 시간: ${{ github.event.head_commit.timestamp }}
    #     to: ${{ env.MAIL_TO }}

    # - name: 실패 이메일 전송
    #   if: failure()
    #   uses: dawidd6/action-send-mail@v3
    #   with:
    #     server_address: smtp.gmail.com
    #     server_port: 465
    #     username: ${{ secrets.MAIL_USERNAME }}
    #     password: ${{ secrets.MAIL_PASSWORD }}
    #     subject: "❌ [${{ github.repository }}] 빌드 실패"
    #     body: |
    #       ❌ 빌드 또는 테스트 실패!
    #
    #       - 브랜치: ${{ github.ref_name }}
    #       - 커밋: ${{ github.sha }}
    #       - 작성자: ${{ github.actor }}
    #       - 시간: ${{ github.event.head_commit.timestamp }}
    #       - 확인: https://github.com/${{ github.repository }}/actions
    #     to: ${{ env.MAIL_TO }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production   # Environment에 등록한 Secrets 사용

    steps:
    - uses: actions/checkout@v4

    - name: 빌드 결과물 다운로드
      uses: actions/download-artifact@v4
      with:
        name: build-artifact

    - name: SSH 키 설정
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key

    - name: SSH 키 파일 검증
      run: |
        echo "~/.ssh/deploy_key 확인:"
        ls -la ~/.ssh/deploy_key
        echo "파일 크기(byte): $(wc -c < ~/.ssh/deploy_key)"
        echo "파일 헤더 확인: $(head -1 ~/.ssh/deploy_key)"
        if ! grep -q "BEGIN.*PRIVATE KEY" ~/.ssh/deploy_key; then
          echo "::error::deploy_key에 유효한 비밀키 형식이 없습니다. SSH_PRIVATE_KEY 확인 필요"
          exit 1
        fi

    - name: 배포 설정 확인 (Secrets 검증)
      env:
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        echo "=========================================="
        echo "배포 Secrets 설정 확인"
        echo "=========================================="
        echo "DEPLOY_HOST: $([ -n "$DEPLOY_HOST" ] && echo '설정됨 (길이: '${#DEPLOY_HOST}')' || echo 'NOT SET')"
        echo "DEPLOY_USER: $([ -n "$DEPLOY_USER" ] && echo '설정됨 (길이: '${#DEPLOY_USER}')' || echo 'NOT SET')"
        echo "DEPLOY_PATH: $([ -n "$DEPLOY_PATH" ] && echo '설정됨 (길이: '${#DEPLOY_PATH}')' || echo 'NOT SET')"
        echo "SSH_PRIVATE_KEY: $([ -n "$SSH_PRIVATE_KEY" ] && echo '설정됨 (길이: '${#SSH_PRIVATE_KEY}')' || echo 'NOT SET')"
        echo "연결 대상: ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"
        echo "=========================================="

    - name: 배포 Secrets 검증
      env:
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      run: |
        if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_PATH" ]; then
          echo "::error::배포에 필요한 Secrets가 설정되지 않았습니다."
          echo "GitHub 저장소 Settings → Secrets and variables → Actions에서 다음을 등록하세요:"
          echo "  - DEPLOY_HOST (OCI 서버 IP 또는 호스트명)"
          echo "  - DEPLOY_USER (SSH 사용자, 예: opc)"
          echo "  - DEPLOY_PATH (배포 경로, 예: /home/opc/cms)"
          exit 1
        fi

    - name: 배포 경로 생성
      env:
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      run: |
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new ${DEPLOY_USER}@${DEPLOY_HOST} "mkdir -p ${DEPLOY_PATH}"

    - name: JAR 복사
      env:
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      run: |
        JAR=$(find . -name "*.jar" ! -path "*-plain*" -print -quit)
        if [ -z "$JAR" ]; then echo "::error::JAR 파일을 찾을 수 없습니다."; exit 1; fi
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$JAR" ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/

    - name: 서버 재시작
      run: |
        ssh -i ~/.ssh/deploy_key \
        -o StrictHostKeyChecking=accept-new \
        ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
          sudo systemctl restart cms
          sudo systemctl status cms --no-pager
        "